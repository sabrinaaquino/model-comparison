<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Ship on Wavy Ocean</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0b0b0d; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, oceanY = 0;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  oceanY = H * 0.58;
}
resize();
window.addEventListener('resize', resize);

// Wave field: sum of moving sine waves
const waves = [
  { amp: 22, len: 460, speed: 0.45, phase: 0.0 },
  { amp: 14, len: 240, speed: -0.78, phase: 1.3 },
  { amp: 8,  len: 130, speed: 0.95, phase: 2.7 },
  { amp: 4,  len: 70,  speed: -1.35, phase: 0.6 }
];

function waveHeight(x, t) {
  let h = 0;
  for (const w of waves) {
    h += w.amp * Math.sin((x / w.len) * Math.PI * 2 + t * w.speed + w.phase);
  }
  return h;
}

// Color ramp: trough #1e3a8a -> mid #4fd1ff -> crest #eaf6ff
function lerp(a, b, t) { return a + (b - a) * t; }
function heightColor(h) {
  const t = (h + 36) / 72;
  const tc = Math.max(0, Math.min(1, t));
  let r, g, b;
  if (tc < 0.5) {
    const k = tc * 2;
    r = lerp(0x1e, 0x4f, k);
    g = lerp(0x3a, 0xd1, k);
    b = lerp(0x8a, 0xff, k);
  } else {
    const k = (tc - 0.5) * 2;
    r = lerp(0x4f, 0xea, k);
    g = lerp(0xd1, 0xf6, k);
    b = lerp(0xff, 0xff, k);
  }
  return 'rgb(' + (r|0) + ',' + (g|0) + ',' + (b|0) + ')';
}

// Ship hull particle layout (relative to hull center, before scaling)
const hullPts = [
  // bottom curve (denser)
  [-22, 4], [-18, 6], [-14, 7], [-10, 8], [-6, 8.5], [-2, 9], [2, 9],
  [6, 8.5], [10, 8], [14, 7], [18, 6], [22, 4],
  // mid-low row
  [-22, 1], [-18, 2], [-14, 3], [-10, 3.5], [-6, 4], [-2, 4.5],
  [2, 4.5], [6, 4], [10, 3.5], [14, 3], [18, 2], [22, 1],
  // mid row
  [-22, -2], [-18, -1], [-14, -0.5], [-10, 0], [-6, 0.5], [-2, 1],
  [2, 1], [6, 0.5], [10, 0], [14, -0.5], [18, -1], [22, -2],
  // top deck row
  [-22, -5], [-18, -4.5], [-14, -4], [-10, -4], [-6, -4], [-2, -4],
  [2, -4], [6, -4], [10, -4], [14, -4], [18, -4.5], [22, -5]
];
// Mast particle layout (relative to hull center, mast rises upward)
const mastPts = [
  // vertical mast
  [0, -8], [0, -12], [0, -16], [0, -20], [0, -24], [0, -28], [0, -32],
  // yard (horizontal spar near top)
  [-7, -24], [-5, -24], [-3, -24], [3, -24], [5, -24], [7, -24],
  // pennant at top
  [3, -32], [6, -31], [9, -30]
];

const PR = 2.4;     // particle radius
const HULL_SCALE = 2.0;
const MAST_SCALE = 1.6;

const t0 = performance.now();
let lastT = t0;
let shipPitch = 0, shipY = 0;

function frame(now) {
  const t = (now - t0) / 1000;
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  // Solid background, repainted every frame
  ctx.fillStyle = '#0b0b0d';
  ctx.fillRect(0, 0, W, H);

  // --- Ocean particles ---
  const spacing = 22;
  const count = Math.ceil(W / spacing) + 2;
  for (let i = 0; i < count; i++) {
    const x = i * spacing - 4;
    const h = waveHeight(x, t);
    const y = oceanY + h;
    ctx.fillStyle = heightColor(h);
    ctx.beginPath();
    ctx.arc(x, y, PR, 0, Math.PI * 2);
    ctx.fill();
  }

  // --- Ship physics ---
  const shipX = W * 0.5;
  const hC = waveHeight(shipX, t);
  const hL = waveHeight(shipX - 20, t);
  const hR = waveHeight(shipX + 20, t);
  const targetY = oceanY + hC - 9;
  const targetPitch = Math.atan2(hR - hL, 40);
  // critically-damped-ish smoothing for stable, non-bouncy tracking
  const k = 1 - Math.exp(-dt * 6);
  shipY += (targetY - shipY) * k;
  shipPitch += (targetPitch - shipPitch) * (1 - Math.exp(-dt * 5));

  // --- Ship particles ---
  ctx.save();
  ctx.translate(shipX, shipY);
  ctx.rotate(shipPitch);
  ctx.fillStyle = '#ff8a3d';
  for (const p of hullPts) {
    ctx.beginPath();
    ctx.arc(p[0] * HULL_SCALE, p[1] * HULL_SCALE, PR, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const p of mastPts) {
    ctx.beginPath();
    ctx.arc(p[0] * MAST_SCALE, p[1] * MAST_SCALE, PR, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();

  // --- On-screen text ---
  ctx.fillStyle = '#e6e6e6';
  ctx.font = '12px monospace';
  ctx.textBaseline = 'top';
  ctx.fillText('particles: ' + (hullPts.length + mastPts.length + count) + '  pitch: ' + (shipPitch * 180 / Math.PI).toFixed(1) + 'deg', 10, 10);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
