<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;}
  canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
"use strict";
var cv=document.getElementById('c'),ctx=cv.getContext('2d');
var W,H,groundY,theta=38*Math.PI/180,rampH,slopeRun,slopeLen,tipXL,tipXR,baseXL,baseXR,v0;
var GRAV=1800;

function layout(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  groundY=H-70;
  rampH=Math.min(H*0.32,230);
  slopeRun=rampH/Math.tan(theta);
  slopeLen=rampH/Math.sin(theta);
  tipXL=W*0.30; tipXR=W*0.70;
  baseXL=tipXL-slopeRun; baseXR=tipXR+slopeRun;
  var D=W/2-tipXL;
  v0=Math.sqrt(GRAV*D/(Math.sin(theta)*Math.cos(theta)));
}
window.addEventListener('resize',layout);
layout();

/* clouds */
var clouds=[];
for(var i=0;i<6;i++){clouds.push({x:Math.random(),y:0.06+Math.random()*0.22,s:0.6+Math.random()*0.9,v:6+Math.random()*10});}

var particles=[],flashes=[],shake=0,round=1,runTime=0,resetTimer=-1,crashed=false;

function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function makeCar(side){
  var c={
    side:side, facing:side,
    scheme: side===1?{body:'#e3342f',dark:'#8f1613',win:'#bfe8ff'}:{body:'#2f7de1',dark:'#123f80',win:'#d5f2ff'},
    state:'run', s:0, speed:0, accel:0,
    x:0,y:0,vx:0,vy:0,angle:0,angVel:0,
    wheelRot:0,stretch:0,crashed:false,bounces:0
  };
  var startX = side===1 ? -110 : W+110;
  c.startX=startX;
  var groundDist = side===1 ? (baseXL-startX) : (startX-baseXR);
  c.groundDist=groundDist;
  var s0=v0*0.55;
  c.speed=s0;
  c.accel=(v0*v0 - s0*s0)/(2*(groundDist+slopeLen));
  c.x=startX; c.y=groundY-19;
  return c;
}
var carL,carR;
function resetRun(){
  carL=makeCar(1); carR=makeCar(-1);
  crashed=false; runTime=0; resetTimer=-1;
}
resetRun();

function dust(x,y,n,big){
  for(var i=0;i<n;i++){
    particles.push({type:'dust',x:x+(Math.random()-0.5)*14,y:y+(Math.random()-0.5)*8,
      vx:(Math.random()-0.5)*(big?220:120),vy:-(Math.random()*(big?140:80)),
      r:4+Math.random()*(big?10:6),life:0.5+Math.random()*0.4,age:0});
  }
}

function crashFX(x,y){
  flashes.push({x:x,y:y,t:0,rot:Math.random()*Math.PI});
  shake=1;
  var cols=['#e3342f','#2f7de1','#8f1613','#123f80','#555','#ddd'];
  for(var i=0;i<26;i++){
    var a=Math.random()*Math.PI*2, sp=180+Math.random()*480;
    particles.push({type:'debris',x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-180,
      s:3+Math.random()*7,rot:Math.random()*7,vr:(Math.random()-0.5)*20,
      col:cols[(Math.random()*cols.length)|0],life:1.2+Math.random()*0.9,age:0});
  }
  for(i=0;i<30;i++){
    a=Math.random()*Math.PI*2; sp=350+Math.random()*650;
    particles.push({type:'spark',x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:0.22+Math.random()*0.22,age:0,col:Math.random()<0.5?'#ffd23f':'#ffffff'});
  }
  for(i=0;i<10;i++){
    particles.push({type:'smoke',x:x+(Math.random()-0.5)*24,y:y+(Math.random()-0.5)*24,
      vx:(Math.random()-0.5)*120,vy:-(30+Math.random()*90),
      r:7+Math.random()*10,life:0.9+Math.random()*0.6,age:0});
  }
  /* sparkles that linger */
  for(i=0;i<12;i++){
    particles.push({type:'sparkle',x:x+(Math.random()-0.5)*90,y:y+(Math.random()-0.5)*70,
      vx:0,vy:-20,life:0.5+Math.random()*0.5,age:0,r:2+Math.random()*3});
  }
}

function updateCar(c,dt){
  if(c.state==='run'){
    c.speed+=c.accel*dt;
    c.s+=c.speed*dt;
    c.wheelRot+=c.speed/11*dt*c.side;
    if(c.s<c.groundDist){
      c.x=c.startX+c.s*c.side;
      c.y=groundY-19;
      c.angle=0;
    }else{
      var d=c.s-c.groundDist;
      if(d>=slopeLen){
        /* LAUNCH */
        c.state='air';
        c.x=(c.side===1?tipXL:tipXR);
        c.y=groundY-rampH-19;
        c.vx=c.speed*Math.cos(theta)*c.side;
        c.vy=-c.speed*Math.sin(theta);
        c.angle=-theta*c.side;
        c.stretch=0.28;
        dust((c.side===1?tipXL:tipXR),groundY-rampH+4,10,true);
      }else{
        c.x=(c.side===1?baseXL:baseXR)+d*Math.cos(theta)*c.side;
        c.y=groundY-d*Math.sin(theta)-19;
        c.angle=-theta*c.side;
        if(Math.random()<0.35)dust(c.x-c.side*30,c.y+18,1,false);
      }
    }
  }else if(c.state==='air'){
    c.vy+=GRAV*dt;
    c.x+=c.vx*dt;
    c.y+=c.vy*dt;
    c.wheelRot+=c.speed/11*dt*c.side;
    if(c.crashed){
      c.angle+=c.angVel*dt;
    }else{
      c.angle=(c.side===1)?Math.atan2(c.vy,c.vx):Math.atan2(-c.vy,-c.vx);
    }
    if(c.y>=groundY-19){
      c.y=groundY-19;
      c.bounces++;
      dust(c.x,groundY,6,c.bounces===1);
      if(Math.abs(c.vy)<120||c.bounces>3){
        c.state='settled';
        c.vy=0;c.vx*=0.5;
        c.stretch=-0.22;
      }else{
        c.vy=-c.vy*0.38;
        c.vx*=0.72;
        c.angVel*=0.55;
        c.stretch=-0.3;
      }
    }
  }else if(c.state==='settled'){
    c.x+=c.vx*dt;
    c.vx*=Math.pow(0.05,dt);
    var target=Math.round(c.angle/Math.PI)*Math.PI;
    c.angle+=(target-c.angle)*Math.min(1,12*dt);
    c.y=groundY-19+ (Math.abs(Math.cos(c.angle))<0.7?4:0);
  }
  c.stretch*=Math.exp(-7*dt);
}

function drawCar(c){
  /* shadow */
  var alt=Math.max(0,(groundY-19)-c.y);
  var sh=Math.max(0.25,1-alt/420);
  ctx.save();
  ctx.globalAlpha=0.25*sh;
  ctx.fillStyle='#000';
  ctx.beginPath();
  ctx.ellipse(c.x,groundY+4,44*sh,8*sh,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(c.x,c.y);
  ctx.rotate(c.angle);
  ctx.scale(c.facing*(1+c.stretch),1-c.stretch);
  var sc=c.scheme;
  /* body */
  ctx.lineWidth=2.5;
  ctx.strokeStyle=sc.dark;
  ctx.fillStyle=sc.body;
  rr(-36,-14,72,22,10); ctx.fill(); ctx.stroke();
  /* roof */
  rr(-18,-32,36,22,9); ctx.fill(); ctx.stroke();
  /* window */
  ctx.fillStyle=sc.win;
  rr(-13,-28,27,14,5); ctx.fill();
  ctx.strokeStyle=sc.dark; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(2,-28); ctx.lineTo(2,-14); ctx.stroke();
  /* headlight */
  ctx.fillStyle='#ffe27a';
  ctx.beginPath(); ctx.arc(33,-6,3.6,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=sc.dark; ctx.lineWidth=1.5; ctx.stroke();
  /* gloss */
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.ellipse(12,-10,15,3.5,-0.08,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-4,-27,9,2.5,0,0,Math.PI*2); ctx.fill();
  /* wheels */
  for(var i=0;i<2;i++){
    var wx=i===0?-21:22;
    ctx.save();
    ctx.translate(wx,9);
    ctx.rotate(c.wheelRot*c.facing);
    ctx.fillStyle='#26262b';
    ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#111'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#d9d9de';
    ctx.beginPath(); ctx.arc(0,0,5.5,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#8b8b92'; ctx.lineWidth=1.5;
    for(var k=0;k<3;k++){
      var a=k*Math.PI*2/3;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*9,Math.sin(a)*9); ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();
}

function drawStar(x,y,r1,r2,n,rot){
  ctx.beginPath();
  for(var i=0;i<n*2;i++){
    var r=i%2===0?r1:r2, a=rot+i*Math.PI/n;
    var px=x+Math.cos(a)*r, py=y+Math.sin(a)*r;
    if(i===0)ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}

var last=performance.now();
function frame(now){
  var dt=Math.min(0.033,(now-last)/1000);
  last=now;
  runTime+=dt;

  /* clouds drift */
  for(var i=0;i<clouds.length;i++){
    clouds[i].x+=clouds[i].v*dt/W;
    if(clouds[i].x>1.15)clouds[i].x=-0.15;
  }

  updateCar(carL,dt);
  updateCar(carR,dt);

  /* mid-air collision */
  if(!crashed && carL.state==='air' && carR.state==='air'){
    var dx=carR.x-carL.x, dy=carR.y-carL.y;
    var hit = (dx*dx+dy*dy<52*52) || (dx<0);
    if(hit){
      crashed=true;
      carL.crashed=true; carR.crashed=true;
      var mx=(carL.x+carR.x)/2, my=(carL.y+carR.y)/2;
      /* momentum transfer: equal masses, restitution */
      var e=0.45;
      var u1=carL.vx,u2=carR.vx;
      carL.vx=((1-e)*u1+(1+e)*u2)/2;
      carR.vx=((1-e)*u2+(1+e)*u1)/2;
      var avy=(carL.vy+carR.vy)/2;
      carL.vy=avy-(180+Math.random()*130);
      carR.vy=avy-(180+Math.random()*130);
      carL.angVel=-(9+Math.random()*5);
      carR.angVel=(9+Math.random()*5);
      carL.stretch=-0.35; carR.stretch=-0.35;
      /* separate slightly */
      carL.x=mx-26; carR.x=mx+26;
      crashFX(mx,my);
    }
  }

  /* reset logic */
  var done=(carL.state==='settled'&&carR.state==='settled')||runTime>12;
  if(done&&resetTimer<0)resetTimer=1.4;
  if(resetTimer>0){
    resetTimer-=dt;
    if(resetTimer<=0){round++;resetRun();}
  }

  /* particles */
  for(i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.age+=dt;
    if(p.age>=p.life){particles.splice(i,1);continue;}
    if(p.type==='debris'){
      p.vy+=GRAV*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.rot+=p.vr*dt;
      if(p.y>groundY){p.y=groundY;p.vy=-p.vy*0.4;p.vx*=0.6;}
    }else if(p.type==='spark'){
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=GRAV*0.4*dt;
    }else if(p.type==='dust'||p.type==='smoke'){
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(0.2,dt); p.vy-=20*dt; p.r+=18*dt;
    }else if(p.type==='sparkle'){
      p.y+=p.vy*dt;
    }
  }

  /* flashes */
  for(i=flashes.length-1;i>=0;i--){
    flashes[i].t+=dt;
    if(flashes[i].t>0.5)flashes.splice(i,1);
  }

  shake=Math.max(0,shake-dt*2.2);

  /* ============ DRAW ============ */
  ctx.setTransform(1,0,0,1,0,0);
  /* sky */
  var g=ctx.createLinearGradient(0,0,0,groundY);
  g.addColorStop(0,'#3d9df3');
  g.addColorStop(1,'#c2e8ff');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);

  if(shake>0){
    ctx.translate((Math.random()-0.5)*16*shake,(Math.random()-0.5)*16*shake);
  }

  /* sun */
  ctx.fillStyle='#ffe066';
  ctx.beginPath(); ctx.arc(W*0.86,H*0.13,36,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,224,102,0.5)'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(W*0.86,H*0.13,46,0,Math.PI*2); ctx.stroke();

  /* clouds */
  ctx.fillStyle='rgba(255,255,255,0.92)';
  for(i=0;i<clouds.length;i++){
    var cl=clouds[i],cx=cl.x*W,cy=cl.y*H,s=cl.s;
    ctx.beginPath();
    ctx.arc(cx,cy,22*s,0,Math.PI*2);
    ctx.arc(cx+24*s,cy+4*s,17*s,0,Math.PI*2);
    ctx.arc(cx-24*s,cy+5*s,15*s,0,Math.PI*2);
    ctx.fill();
  }

  /* far hills */
  ctx.fillStyle='#7ecb5a';
  ctx.beginPath();
  ctx.moveTo(0,groundY);
  ctx.quadraticCurveTo(W*0.2,groundY-90,W*0.42,groundY);
  ctx.moveTo(W*0.55,groundY);
  ctx.quadraticCurveTo(W*0.78,groundY-110,W,groundY);
  ctx.lineTo(W,groundY);ctx.lineTo(0,groundY);
  ctx.fill();

  /* ground */
  ctx.fillStyle='#8b5a2b';
  ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle='#57b03c';
  ctx.fillRect(0,groundY,W,14);
  ctx.fillStyle='#6b4420';
  for(i=0;i<14;i++){
    var gx=((i*197+61)%W);
    ctx.fillRect(gx,groundY+24+((i*67)%30),8,4);
  }

  /* ramps: dirt body + grass surface */
  function ramp(tipX,side){
    var bx=tipX-side*slopeRun;
    ctx.fillStyle='#8b5a2b';
    ctx.beginPath();
    ctx.moveTo(bx,groundY);
    ctx.lineTo(tipX,groundY-rampH);
    ctx.lineTo(tipX,groundY);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#5f3c1a'; ctx.lineWidth=3; ctx.stroke();
    /* grass strip along slope */
    ctx.strokeStyle='#57b03c'; ctx.lineWidth=10;
    ctx.beginPath();
    ctx.moveTo(bx,groundY-3);
    ctx.lineTo(tipX,groundY-rampH-3);
    ctx.stroke();
    ctx.strokeStyle='#3f8c2a'; ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(bx,groundY-8);
    ctx.lineTo(tipX,groundY-rampH-8);
    ctx.stroke();
    /* board face at tip */
    ctx.fillStyle='#c9973f';
    ctx.fillRect(tipX-side*6- (side===1?0:0)-3,groundY-rampH,6,rampH);
  }
  ramp(tipXL,1);
  ramp(tipXR,-1);

  /* smoke/dust behind cars */
  for(i=0;i<particles.length;i++){
    var p=particles[i];
    var t=p.age/p.life;
    if(p.type==='dust'){
      ctx.fillStyle='rgba(222,206,180,'+(0.55*(1-t))+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }else if(p.type==='smoke'){
      ctx.fillStyle='rgba(90,90,95,'+(0.5*(1-t))+')';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
  }

  drawCar(carL);
  drawCar(carR);

  /* debris & sparks on top */
  for(i=0;i<particles.length;i++){
    p=particles[i]; t=p.age/p.life;
    if(p.type==='debris'){
      ctx.save();
      ctx.globalAlpha=1-t*t;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.col;
      ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s);
      ctx.restore();
    }else if(p.type==='spark'){
      ctx.strokeStyle=p.col;
      ctx.globalAlpha=1-t;
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(p.x,p.y);
      ctx.lineTo(p.x-p.vx*0.035,p.y-p.vy*0.035);
      ctx.stroke();
      ctx.globalAlpha=1;
    }else if(p.type==='sparkle'){
      ctx.fillStyle='rgba(255,255,255,'+(1-t)+')';
      drawStar(p.x,p.y,p.r*2,p.r*0.7,4,p.age*6);
      ctx.fill();
    }
  }

  /* crash flash star */
  for(i=0;i<flashes.length;i++){
    var f=flashes[i];
    var sc2=Math.min(1,f.t/0.08);
    var al=1-f.t/0.5;
    ctx.save();
    ctx.globalAlpha=al;
    ctx.fillStyle='#ffd23f';
    ctx.strokeStyle='#e07b00'; ctx.lineWidth=3;
    drawStar(f.x,f.y,86*sc2,38*sc2,9,f.rot);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle='#ffffff';
    drawStar(f.x,f.y,44*sc2,18*sc2,9,f.rot+0.3);
    ctx.fill();
    ctx.restore();
  }

  /* round badge */
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  rr(12,12,150,34,10); ctx.fill();
  ctx.fillStyle='#ffe066';
  ctx.font='bold 20px "Comic Sans MS", "Trebuchet MS", sans-serif';
  ctx.textBaseline='middle';
  ctx.fillText('ROUND '+round,26,30);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
