<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html,body{margin:0;padding:0;overflow:hidden;}
  canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var W = 0, H = 0;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    computeArena();
  }
  window.addEventListener('resize', resize);

  // Play area (inside the frame)
  var FRAME = 26; // frame thickness
  var MARGIN = 18;
  var arena = {x:0,y:0,w:0,h:0};
  function computeArena(){
    arena.x = MARGIN + FRAME;
    arena.y = MARGIN + FRAME;
    arena.w = W - 2*(MARGIN + FRAME);
    arena.h = H - 2*(MARGIN + FRAME);
    if(arena.w < 100) arena.w = 100;
    if(arena.h < 100) arena.h = 100;
  }

  var COLORS = [
    {main:'#ff3b3b', dark:'#a30f0f'}, // red
    {main:'#2f8cff', dark:'#0b3f9e'}, // blue
    {main:'#3ddc4f', dark:'#0f7a1e'}, // green
    {main:'#ffd23b', dark:'#b8860b'}, // yellow
    {main:'#b04dff', dark:'#5c0f9e'}, // purple
    {main:'#ff8a1e', dark:'#a34c00'}, // orange
    {main:'#ff5fb0', dark:'#a8146b'}, // pink
    {main:'#25d4c8', dark:'#0a7a72'}  // teal
  ];

  var balls = [];
  var sparkles = [];
  var collisionCount = 0;
  var NUM = 40;

  function rand(a,b){ return a + Math.random()*(b-a); }

  function initBalls(){
    balls = [];
    var tries = 0;
    while(balls.length < NUM && tries < 20000){
      tries++;
      var r = rand(10, 26);
      var x = rand(arena.x + r, arena.x + arena.w - r);
      var y = rand(arena.y + r, arena.y + arena.h - r);
      var ok = true;
      for(var i=0;i<balls.length;i++){
        var dx = balls[i].x - x, dy = balls[i].y - y;
        if(dx*dx + dy*dy < (balls[i].r + r + 2)*(balls[i].r + r + 2)){ ok = false; break; }
      }
      if(!ok) continue;
      var sp = rand(80, 220);
      var ang = rand(0, Math.PI*2);
      balls.push({
        x:x, y:y, r:r,
        vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
        m: r*r,
        color: COLORS[balls.length % COLORS.length],
        squash: 0,        // 0..1 amount
        sqAng: 0          // squash axis angle
      });
    }
  }

  function addSparkle(x,y,scale){
    sparkles.push({x:x, y:y, t:0, life:0.35, s:scale});
    if(sparkles.length > 120) sparkles.splice(0, sparkles.length-120);
  }

  // ---------- Physics ----------
  function physics(dt){
    var i, j, b;
    // substeps to avoid tunneling
    var steps = 3;
    var h = dt/steps;
    for(var s=0;s<steps;s++){
      // move
      for(i=0;i<balls.length;i++){
        b = balls[i];
        b.x += b.vx*h;
        b.y += b.vy*h;
      }
      // walls
      var L = arena.x, T = arena.y, R = arena.x + arena.w, B = arena.y + arena.h;
      for(i=0;i<balls.length;i++){
        b = balls[i];
        if(b.x - b.r < L){ b.x = L + b.r; if(b.vx < 0){ b.vx = -b.vx; hitWall(b, Math.PI);} }
        if(b.x + b.r > R){ b.x = R - b.r; if(b.vx > 0){ b.vx = -b.vx; hitWall(b, 0);} }
        if(b.y - b.r < T){ b.y = T + b.r; if(b.vy < 0){ b.vy = -b.vy; hitWall(b, -Math.PI/2);} }
        if(b.y + b.r > B){ b.y = B - b.r; if(b.vy > 0){ b.vy = -b.vy; hitWall(b, Math.PI/2);} }
      }
      // ball-ball elastic collisions
      for(i=0;i<balls.length;i++){
        for(j=i+1;j<balls.length;j++){
          var a = balls[i], c = balls[j];
          var dx = c.x - a.x, dy = c.y - a.y;
          var rr = a.r + c.r;
          var d2 = dx*dx + dy*dy;
          if(d2 < rr*rr && d2 > 1e-9){
            var d = Math.sqrt(d2);
            var nx = dx/d, ny = dy/d;
            // positional correction (split by mass)
            var overlap = rr - d;
            var totalM = a.m + c.m;
            a.x -= nx * overlap * (c.m/totalM);
            a.y -= ny * overlap * (c.m/totalM);
            c.x += nx * overlap * (a.m/totalM);
            c.y += ny * overlap * (a.m/totalM);
            // relative velocity along normal
            var rvx = c.vx - a.vx, rvy = c.vy - a.vy;
            var vn = rvx*nx + rvy*ny;
            if(vn < 0){
              // elastic impulse (e = 1)
              var jimp = -(2) * vn / (1/a.m + 1/c.m);
              a.vx -= (jimp*nx)/a.m;
              a.vy -= (jimp*ny)/a.m;
              c.vx += (jimp*nx)/c.m;
              c.vy += (jimp*ny)/c.m;
              collisionCount++;
              var ang = Math.atan2(ny, nx);
              a.squash = 1; a.sqAng = ang;
              c.squash = 1; c.sqAng = ang;
              var cx = a.x + nx*a.r, cy = a.y + ny*a.r;
              addSparkle(cx, cy, Math.min(1.4, 0.5 + Math.abs(vn)/300));
            }
          }
        }
      }
    }
    // decay squash
    for(i=0;i<balls.length;i++){
      balls[i].squash *= Math.pow(0.001, dt); // fast decay
      if(balls[i].squash < 0.01) balls[i].squash = 0;
    }
    // sparkles
    for(i=sparkles.length-1;i>=0;i--){
      sparkles[i].t += dt;
      if(sparkles[i].t > sparkles[i].life) sparkles.splice(i,1);
    }
  }

  function hitWall(b, ang){
    collisionCount++;
    b.squash = 1;
    b.sqAng = ang;
    addSparkle(b.x + Math.cos(ang)*b.r, b.y + Math.sin(ang)*b.r, 0.7);
  }

  // ---------- Rendering ----------
  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawBackground(){
    var g = ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#7ec8ff');
    g.addColorStop(0.55,'#bfe6ff');
    g.addColorStop(1,'#fff3c9');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);
    // playful faint bubbles in bg
    ctx.save();
    ctx.globalAlpha = 0.10;
    ctx.fillStyle = '#ffffff';
    for(var i=0;i<8;i++){
      var bx = (i*197.3)%W, by = (i*131.7)%H, br = 40 + (i*37)%80;
      ctx.beginPath();
      ctx.arc(bx, by, br, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFrame(){
    var x = MARGIN, y = MARGIN, w = W-2*MARGIN, h = H-2*MARGIN;
    // outer shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 14;
    ctx.shadowOffsetY = 6;
    // frame body gradient
    var g = ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#ff9d3c');
    g.addColorStop(0.5,'#ff7a1a');
    g.addColorStop(1,'#e05a00');
    ctx.fillStyle = g;
    roundRect(ctx,x,y,w,h,28);
    ctx.fill();
    ctx.restore();
    // bevel highlight
    ctx.save();
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    roundRect(ctx,x+4,y+4,w-8,h-8,24);
    ctx.stroke();
    ctx.lineWidth = 5;
    ctx.strokeStyle = 'rgba(120,40,0,0.45)';
    roundRect(ctx,x+FRAME-6,y+FRAME-6,w-2*(FRAME-6),h-2*(FRAME-6),16);
    ctx.stroke();
    ctx.restore();
    // inner play field
    var ig = ctx.createLinearGradient(arena.x, arena.y, arena.x, arena.y+arena.h);
    ig.addColorStop(0,'#e8fbff');
    ig.addColorStop(1,'#c2ecff');
    ctx.fillStyle = ig;
    roundRect(ctx, arena.x, arena.y, arena.w, arena.h, 14);
    ctx.fill();
    // inner subtle edge
    ctx.save();
    ctx.strokeStyle = 'rgba(0,80,120,0.25)';
    ctx.lineWidth = 3;
    roundRect(ctx, arena.x+1.5, arena.y+1.5, arena.w-3, arena.h-3, 12);
    ctx.stroke();
    ctx.restore();
  }

  function drawBall(b){
    ctx.save();
    ctx.translate(b.x, b.y);
    // squash: scale down along collision normal, up perpendicular
    var s = b.squash * 0.28;
    ctx.rotate(b.sqAng);
    ctx.scale(1 - s, 1 + s);
    ctx.rotate(-b.sqAng);

    // drop shadow beneath
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(3, b.r*0.55, b.r*0.9, b.r*0.45, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // glossy body
    var g = ctx.createRadialGradient(-b.r*0.35, -b.r*0.4, b.r*0.1, 0, 0, b.r*1.05);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(0.18, b.color.main);
    g.addColorStop(0.75, b.color.main);
    g.addColorStop(1, b.color.dark);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(0,0,b.r,0,Math.PI*2);
    ctx.fill();

    // specular highlight
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(-b.r*0.35, -b.r*0.42, b.r*0.28, b.r*0.17, -0.6, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // bottom rim light
    ctx.save();
    ctx.globalAlpha = 0.20;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = b.r*0.14;
    ctx.beginPath();
    ctx.arc(0,0,b.r*0.82, Math.PI*0.25, Math.PI*0.75);
    ctx.stroke();
    ctx.restore();

    ctx.restore();
  }

  function drawSparkles(){
    for(var i=0;i<sparkles.length;i++){
      var sp = sparkles[i];
      var p = sp.t/sp.life;
      var a = 1 - p;
      var size = (4 + 10*p) * sp.s;
      ctx.save();
      ctx.translate(sp.x, sp.y);
      ctx.rotate(p*1.5);
      ctx.globalAlpha = a;
      ctx.fillStyle = '#ffffff';
      // 4-point star
      ctx.beginPath();
      for(var k=0;k<4;k++){
        var ang = k*Math.PI/2;
        ctx.lineTo(Math.cos(ang)*size, Math.sin(ang)*size);
        ctx.lineTo(Math.cos(ang+Math.PI/4)*size*0.3, Math.sin(ang+Math.PI/4)*size*0.3);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  function drawHUD(){
    var pad = 14;
    var x = MARGIN + 14, y = MARGIN + 14;
    var w = 190, h = 78;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 4;
    var g = ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#4db1ff');
    g.addColorStop(1,'#1873d8');
    ctx.fillStyle = g;
    roundRect(ctx,x,y,w,h,16);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 3;
    roundRect(ctx,x+3,y+3,w-6,h-6,13);
    ctx.stroke();

    ctx.font = 'bold 17px "Comic Sans MS","Trebuchet MS",Verdana,sans-serif';
    ctx.textBaseline = 'middle';
    // text with cartoon outline
    function label(txt, tx, ty){
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(0,50,110,0.9)';
      ctx.strokeText(txt, tx, ty);
      ctx.fillStyle = '#ffffff';
      ctx.fillText(txt, tx, ty);
    }
    label('COLISOES: ' + collisionCount, x+pad, y+26);
    label('BOLAS: ' + balls.length, x+pad, y+54);
    ctx.restore();
  }

  // ---------- Main loop ----------
  var last = 0;
  function frame(t){
    var dt = (t - last)/1000;
    last = t;
    if(dt > 0.05) dt = 0.05;
    if(dt > 0) physics(dt);

    drawBackground();
    drawFrame();

    ctx.save();
    roundRect(ctx, arena.x, arena.y, arena.w, arena.h, 14);
    ctx.clip();
    for(var i=0;i<balls.length;i++) drawBall(balls[i]);
    drawSparkles();
    ctx.restore();

    drawHUD();
    requestAnimationFrame(frame);
  }

  resize();
  initBalls();
  requestAnimationFrame(function(t){ last = t; requestAnimationFrame(frame); });
})();
</script>
</body>
</html>
