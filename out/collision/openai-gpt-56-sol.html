<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title></title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const BALL_COUNT = 40;
  const colors = [
    ["#ff354f","#a90025"],
    ["#38a9ff","#0758c9"],
    ["#63df53","#168826"],
    ["#ffd83d","#e58a00"],
    ["#bd67ff","#6723bd"],
    ["#ff9238","#d53e08"],
    ["#35e6d3","#078b9d"],
    ["#ff65ba","#b81272"]
  ];

  let width = 0;
  let height = 0;
  let dpr = 1;
  let bounds = {};
  let balls = [];
  let sparkles = [];
  let collisions = 0;
  let accumulator = 0;
  let previousTime = performance.now();
  let contactPairs = new Set();

  function roundedRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function updateBounds() {
    const margin = Math.max(18, Math.min(34, width * 0.035, height * 0.045));
    bounds.left = margin + 9;
    bounds.top = margin + 9;
    bounds.right = width - margin - 9;
    bounds.bottom = height - margin - 9;
  }

  function resize() {
    const oldW = width || innerWidth;
    const oldH = height || innerHeight;
    width = innerWidth;
    height = innerHeight;
    dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    updateBounds();

    if (!balls.length) {
      createBalls();
    } else {
      const sx = width / oldW;
      const sy = height / oldH;
      for (const b of balls) {
        b.x *= sx;
        b.y *= sy;
        b.x = Math.max(bounds.left + b.r, Math.min(bounds.right - b.r, b.x));
        b.y = Math.max(bounds.top + b.r, Math.min(bounds.bottom - b.r, b.y));
      }
    }
  }

  function createBalls() {
    balls = [];
    const availableW = bounds.right - bounds.left;
    const availableH = bounds.bottom - bounds.top;
    const maxR = Math.max(8, Math.min(19, Math.min(availableW, availableH) / 18));

    for (let i = 0; i < BALL_COUNT; i++) {
      let r = Math.max(7, maxR * (0.55 + Math.random() * 0.45));
      let x = 0;
      let y = 0;
      let valid = false;

      for (let attempt = 0; attempt < 1200 && !valid; attempt++) {
        x = bounds.left + r + Math.random() * Math.max(1, availableW - r * 2);
        y = bounds.top + r + Math.random() * Math.max(1, availableH - r * 2);
        valid = balls.every(b => Math.hypot(x - b.x, y - b.y) > r + b.r + 2);
      }

      if (!valid) {
        r = Math.max(5, r * 0.72);
        x = bounds.left + r + Math.random() * Math.max(1, availableW - r * 2);
        y = bounds.top + r + Math.random() * Math.max(1, availableH - r * 2);
      }

      const angle = Math.random() * Math.PI * 2;
      const speed = 70 + Math.random() * 100;
      balls.push({
        x, y, r,
        mass: r * r,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        color: colors[i % colors.length],
        pulse: 0
      });
    }

    separateAll();
  }

  function separateAll() {
    for (let pass = 0; pass < 15; pass++) {
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i];
          const b = balls[j];
          let dx = b.x - a.x;
          let dy = b.y - a.y;
          let dist = Math.hypot(dx, dy);
          const minDist = a.r + b.r + 0.2;

          if (dist < minDist) {
            if (dist < 0.0001) {
              dx = 1;
              dy = 0;
              dist = 1;
            }
            const nx = dx / dist;
            const ny = dy / dist;
            const shift = (minDist - dist) / 2;
            a.x -= nx * shift;
            a.y -= ny * shift;
            b.x += nx * shift;
            b.y += ny * shift;
          }
        }
      }
    }
  }

  function makeSparkle(x, y, color) {
    sparkles.push({
      x, y, color,
      age: 0,
      life: 0.24,
      rotation: Math.random() * Math.PI
    });
  }

  function wallHit(ball, side) {
    collisions++;
    ball.pulse = 1;
    let x = ball.x;
    let y = ball.y;
    if (side === 0) x = bounds.left;
    if (side === 1) x = bounds.right;
    if (side === 2) y = bounds.top;
    if (side === 3) y = bounds.bottom;
    makeSparkle(x, y, ball.color[0]);
  }

  function simulate(dt) {
    for (const b of balls) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.pulse = Math.max(0, b.pulse - dt * 6);

      if (b.x - b.r < bounds.left) {
        b.x = bounds.left + b.r;
        if (b.vx < 0) {
          b.vx = -b.vx;
          wallHit(b, 0);
        }
      }
      if (b.x + b.r > bounds.right) {
        b.x = bounds.right - b.r;
        if (b.vx > 0) {
          b.vx = -b.vx;
          wallHit(b, 1);
        }
      }
      if (b.y - b.r < bounds.top) {
        b.y = bounds.top + b.r;
        if (b.vy < 0) {
          b.vy = -b.vy;
          wallHit(b, 2);
        }
      }
      if (b.y + b.r > bounds.bottom) {
        b.y = bounds.bottom - b.r;
        if (b.vy > 0) {
          b.vy = -b.vy;
          wallHit(b, 3);
        }
      }
    }

    const currentContacts = new Set();

    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i];
        const b = balls[j];
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        let distance = Math.hypot(dx, dy);
        const minDistance = a.r + b.r;

        if (distance < minDistance) {
          const key = i + ":" + j;
          currentContacts.add(key);

          if (distance < 0.00001) {
            dx = 1;
            dy = 0;
            distance = 1;
          }

          const nx = dx / distance;
          const ny = dy / distance;
          const invA = 1 / a.mass;
          const invB = 1 / b.mass;
          const penetration = minDistance - distance;
          const correction = penetration / (invA + invB);

          a.x -= nx * correction * invA;
          a.y -= ny * correction * invA;
          b.x += nx * correction * invB;
          b.y += ny * correction * invB;

          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const normalSpeed = rvx * nx + rvy * ny;

          if (normalSpeed < 0) {
            const impulse = -(2 * normalSpeed) / (invA + invB);
            const ix = impulse * nx;
            const iy = impulse * ny;

            a.vx -= ix * invA;
            a.vy -= iy * invA;
            b.vx += ix * invB;
            b.vy += iy * invB;

            if (!contactPairs.has(key)) {
              collisions++;
              a.pulse = 1;
              b.pulse = 1;
              makeSparkle(
                a.x + nx * a.r,
                a.y + ny * a.r,
                Math.random() < 0.5 ? a.color[0] : b.color[0]
              );
            }
          }
        }
      }
    }

    contactPairs = currentContacts;

    for (let i = sparkles.length - 1; i >= 0; i--) {
      sparkles[i].age += dt;
      if (sparkles[i].age >= sparkles[i].life) sparkles.splice(i, 1);
    }
  }

  function drawBackground() {
    const bg = ctx.createLinearGradient(0, 0, width, height);
    bg.addColorStop(0, "#52c9ff");
    bg.addColorStop(0.48, "#9eeaff");
    bg.addColorStop(1, "#fff0a8");
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, width, height);

    ctx.globalAlpha = 0.13;
    ctx.fillStyle = "#ffffff";
    for (let y = 12; y < height; y += 42) {
      for (let x = (Math.floor(y / 42) % 2) * 22; x < width; x += 44) {
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }

  function drawFrame() {
    const x = bounds.left - 9;
    const y = bounds.top - 9;
    const w = bounds.right - bounds.left + 18;
    const h = bounds.bottom - bounds.top + 18;

    ctx.save();
    ctx.shadowColor = "rgba(20,70,100,0.42)";
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 7;
    roundedRect(x, y, w, h, 22);
    ctx.fillStyle = "#ff8c28";
    ctx.fill();
    ctx.restore();

    roundedRect(x, y, w, h, 22);
    ctx.lineWidth = 7;
    ctx.strokeStyle = "#e55319";
    ctx.stroke();

    roundedRect(x + 4, y + 4, w - 8, h - 8, 18);
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#ffd85a";
    ctx.stroke();

    roundedRect(bounds.left, bounds.top, bounds.right - bounds.left, bounds.bottom - bounds.top, 12);
    ctx.fillStyle = "rgba(255,255,255,0.13)";
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(255,255,255,0.9)";
    ctx.stroke();
  }

  function drawBall(b) {
    const p = Math.sin(b.pulse * Math.PI);
    const sx = 1 + p * 0.11;
    const sy = 1 - p * 0.09;

    ctx.save();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = "#183b55";
    ctx.beginPath();
    ctx.ellipse(b.x + 2, b.y + b.r * 0.84, b.r * 0.82, b.r * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(sx, sy);

    const sphere = ctx.createRadialGradient(
      -b.r * 0.38, -b.r * 0.42, b.r * 0.08,
      0, 0, b.r
    );
    sphere.addColorStop(0, "#ffffff");
    sphere.addColorStop(0.14, b.color[0]);
    sphere.addColorStop(0.7, b.color[0]);
    sphere.addColorStop(1, b.color[1]);

    ctx.fillStyle = sphere;
    ctx.beginPath();
    ctx.arc(0, 0, b.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.82;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.ellipse(-b.r * 0.34, -b.r * 0.39, b.r * 0.2, b.r * 0.13, -0.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 0.18;
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(b.r * 0.22, b.r * 0.2, b.r * 0.65, 0.1, 1.45);
    ctx.lineTo(0, 0);
    ctx.fill();
    ctx.restore();
  }

  function drawSparkles() {
    for (const s of sparkles) {
      const t = s.age / s.life;
      const size = 4 + t * 10;
      ctx.save();
      ctx.translate(s.x, s.y);
      ctx.rotate(s.rotation);
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2.4 * (1 - t * 0.5);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-size, 0);
      ctx.lineTo(size, 0);
      ctx.moveTo(0, -size);
      ctx.lineTo(0, size);
      ctx.stroke();

      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-size * 0.55, -size * 0.55);
      ctx.lineTo(size * 0.55, size * 0.55);
      ctx.moveTo(size * 0.55, -size * 0.55);
      ctx.lineTo(-size * 0.55, size * 0.55);
      ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    const x = bounds.left + 14;
    const y = bounds.top + 14;
    const w = Math.min(176, Math.max(142, width * 0.2));
    const h = 70;

    ctx.save();
    ctx.shadowColor = "rgba(32,50,90,0.4)";
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 5;
    roundedRect(x, y, w, h, 16);
    ctx.fillStyle = "#7346cf";
    ctx.fill();
    ctx.restore();

    roundedRect(x, y, w, h, 16);
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#4a258e";
    ctx.stroke();

    roundedRect(x + 4, y + 4, w - 8, h - 8, 12);
    ctx.lineWidth = 2;
    ctx.strokeStyle = "#c9a8ff";
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.strokeStyle = "#442077";
    ctx.lineWidth = 3;
    ctx.lineJoin = "round";
    ctx.font = "bold 16px 'Arial Rounded MT Bold', Arial, sans-serif";
    ctx.textBaseline = "middle";

    const line1 = "COLISOES  " + collisions;
    const line2 = "BOLAS     " + balls.length;
    ctx.strokeText(line1, x + 14, y + 23);
    ctx.fillText(line1, x + 14, y + 23);
    ctx.strokeText(line2, x + 14, y + 48);
    ctx.fillText(line2, x + 14, y + 48);
  }

  function render() {
    drawBackground();
    drawFrame();

    ctx.save();
    roundedRect(bounds.left, bounds.top, bounds.right - bounds.left, bounds.bottom - bounds.top, 12);
    ctx.clip();
    for (const b of balls) drawBall(b);
    drawSparkles();
    ctx.restore();

    drawHUD();
  }

  function frame(now) {
    const elapsed = Math.min(0.05, (now - previousTime) / 1000);
    previousTime = now;
    accumulator += elapsed;

    const step = 1 / 120;
    let iterations = 0;
    while (accumulator >= step && iterations < 8) {
      simulate(step);
      accumulator -= step;
      iterations++;
    }

    render();
    requestAnimationFrame(frame);
  }

  addEventListener("resize", resize);
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
