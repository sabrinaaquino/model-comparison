<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Collision Arena</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const COLORS = ["#00ffff", "#ff00ff", "#ffff00", "#39ff14", "#ff7700"];
  const BALL_COUNT = 40;
  const FIXED_STEP = 1 / 60;

  let width = 0;
  let height = 0;
  let dpr = 1;
  let arena = { left: 34, top: 92, right: 0, bottom: 0 };
  let balls = [];
  let sparks = [];
  let flashes = [];
  let collisions = 0;
  let accumulator = 0;
  let previousTime = performance.now();

  function random(min, max) {
    return min + Math.random() * (max - min);
  }

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2);

    canvas.width = Math.max(1, Math.round(width * dpr));
    canvas.height = Math.max(1, Math.round(height * dpr));
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const margin = Math.max(24, Math.min(40, width * 0.04));
    arena.left = margin;
    arena.top = Math.max(88, margin);
    arena.right = Math.max(arena.left + 120, width - margin);
    arena.bottom = Math.max(arena.top + 120, height - margin);

    initializeBalls();
    sparks.length = 0;
    flashes.length = 0;
    collisions = 0;
  }

  function initializeBalls() {
    balls = [];
    const arenaWidth = arena.right - arena.left;
    const arenaHeight = arena.bottom - arena.top;
    const sizeScale = Math.min(1, Math.sqrt((arenaWidth * arenaHeight) / 500000));

    for (let i = 0; i < BALL_COUNT; i++) {
      let radius = random(7, 15) * Math.max(0.65, sizeScale);
      let x = 0;
      let y = 0;
      let placed = false;

      for (let attempt = 0; attempt < 1500; attempt++) {
        x = random(arena.left + radius + 3, arena.right - radius - 3);
        y = random(arena.top + radius + 3, arena.bottom - radius - 3);

        placed = balls.every(ball => {
          const dx = x - ball.x;
          const dy = y - ball.y;
          const minDistance = radius + ball.r + 2;
          return dx * dx + dy * dy >= minDistance * minDistance;
        });

        if (placed) break;
      }

      if (!placed) {
        radius = Math.max(5, radius * 0.75);
        x = random(arena.left + radius, arena.right - radius);
        y = random(arena.top + radius, arena.bottom - radius);
      }

      const angle = random(0, Math.PI * 2);
      const speed = random(75, 175);

      balls.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: radius,
        mass: radius * radius,
        color: COLORS[i % COLORS.length]
      });
    }

    separateAllBalls(20);
  }

  function separateAllBalls(iterations) {
    for (let iteration = 0; iteration < iterations; iteration++) {
      for (let i = 0; i < balls.length; i++) {
        const a = balls[i];

        a.x = Math.max(arena.left + a.r, Math.min(arena.right - a.r, a.x));
        a.y = Math.max(arena.top + a.r, Math.min(arena.bottom - a.r, a.y));

        for (let j = i + 1; j < balls.length; j++) {
          const b = balls[j];
          let dx = b.x - a.x;
          let dy = b.y - a.y;
          let distanceSquared = dx * dx + dy * dy;
          const minimum = a.r + b.r;

          if (distanceSquared < minimum * minimum) {
            if (distanceSquared < 0.000001) {
              const angle = random(0, Math.PI * 2);
              dx = Math.cos(angle);
              dy = Math.sin(angle);
              distanceSquared = 1;
            }

            const distance = Math.sqrt(distanceSquared);
            const nx = dx / distance;
            const ny = dy / distance;
            const overlap = minimum - distance + 0.01;
            const totalMass = a.mass + b.mass;

            a.x -= nx * overlap * (b.mass / totalMass);
            a.y -= ny * overlap * (b.mass / totalMass);
            b.x += nx * overlap * (a.mass / totalMass);
            b.y += ny * overlap * (a.mass / totalMass);
          }
        }
      }
    }
  }

  function emitCollision(x, y, colorA, colorB, nx, ny, strength) {
    collisions++;
    const count = Math.min(12, 5 + Math.floor(strength / 45));

    for (let i = 0; i < count; i++) {
      const tangentX = -ny;
      const tangentY = nx;
      const direction = Math.random() < 0.5 ? 1 : -1;
      const spread = random(-1.2, 1.2);
      const speed = random(55, 175) + Math.min(strength, 180) * 0.35;
      const dx = nx * direction + tangentX * spread;
      const dy = ny * direction + tangentY * spread;
      const length = Math.hypot(dx, dy) || 1;

      sparks.push({
        x,
        y,
        vx: dx / length * speed,
        vy: dy / length * speed,
        life: random(0.18, 0.42),
        maxLife: 0,
        color: Math.random() < 0.5 ? colorA : colorB,
        size: random(1, 2.4)
      });
      sparks[sparks.length - 1].maxLife = sparks[sparks.length - 1].life;
    }

    flashes.push({
      x,
      y,
      life: 0.12,
      maxLife: 0.12,
      radius: random(8, 15),
      color: Math.random() < 0.5 ? colorA : colorB
    });

    if (sparks.length > 700) sparks.splice(0, sparks.length - 700);
    if (flashes.length > 120) flashes.splice(0, flashes.length - 120);
  }

  function emitWallCollision(ball, x, y, nx, ny, strength) {
    collisions++;
    const count = 5;

    for (let i = 0; i < count; i++) {
      const tangentX = -ny;
      const tangentY = nx;
      const spread = random(-1.3, 1.3);
      const dx = nx + tangentX * spread;
      const dy = ny + tangentY * spread;
      const length = Math.hypot(dx, dy) || 1;
      const speed = random(65, 145) + Math.min(strength, 150) * 0.25;

      sparks.push({
        x,
        y,
        vx: dx / length * speed,
        vy: dy / length * speed,
        life: random(0.16, 0.35),
        maxLife: 0,
        color: ball.color,
        size: random(1, 2.2)
      });
      sparks[sparks.length - 1].maxLife = sparks[sparks.length - 1].life;
    }

    flashes.push({
      x,
      y,
      life: 0.1,
      maxLife: 0.1,
      radius: 10,
      color: ball.color
    });
  }

  function resolveWalls(ball) {
    if (ball.x - ball.r < arena.left) {
      ball.x = arena.left + ball.r;
      if (ball.vx < 0) {
        const strength = Math.abs(ball.vx);
        ball.vx = -ball.vx;
        emitWallCollision(ball, arena.left, ball.y, 1, 0, strength);
      }
    } else if (ball.x + ball.r > arena.right) {
      ball.x = arena.right - ball.r;
      if (ball.vx > 0) {
        const strength = Math.abs(ball.vx);
        ball.vx = -ball.vx;
        emitWallCollision(ball, arena.right, ball.y, -1, 0, strength);
      }
    }

    if (ball.y - ball.r < arena.top) {
      ball.y = arena.top + ball.r;
      if (ball.vy < 0) {
        const strength = Math.abs(ball.vy);
        ball.vy = -ball.vy;
        emitWallCollision(ball, ball.x, arena.top, 0, 1, strength);
      }
    } else if (ball.y + ball.r > arena.bottom) {
      ball.y = arena.bottom - ball.r;
      if (ball.vy > 0) {
        const strength = Math.abs(ball.vy);
        ball.vy = -ball.vy;
        emitWallCollision(ball, ball.x, arena.bottom, 0, -1, strength);
      }
    }
  }

  function resolveBallCollisions() {
    for (let i = 0; i < balls.length; i++) {
      const a = balls[i];

      for (let j = i + 1; j < balls.length; j++) {
        const b = balls[j];
        let dx = b.x - a.x;
        let dy = b.y - a.y;
        const minimum = a.r + b.r;
        let distanceSquared = dx * dx + dy * dy;

        if (distanceSquared > minimum * minimum) continue;

        if (distanceSquared < 0.000001) {
          const angle = random(0, Math.PI * 2);
          dx = Math.cos(angle);
          dy = Math.sin(angle);
          distanceSquared = 1;
        }

        const distance = Math.sqrt(distanceSquared);
        const nx = dx / distance;
        const ny = dy / distance;
        const overlap = minimum - distance;
        const totalMass = a.mass + b.mass;

        if (overlap > 0) {
          const correction = overlap + 0.02;
          a.x -= nx * correction * (b.mass / totalMass);
          a.y -= ny * correction * (b.mass / totalMass);
          b.x += nx * correction * (a.mass / totalMass);
          b.y += ny * correction * (a.mass / totalMass);
        }

        const relativeVX = b.vx - a.vx;
        const relativeVY = b.vy - a.vy;
        const normalVelocity = relativeVX * nx + relativeVY * ny;

        if (normalVelocity >= 0) continue;

        const impulse = -(2 * normalVelocity) / (1 / a.mass + 1 / b.mass);
        const impulseX = impulse * nx;
        const impulseY = impulse * ny;

        a.vx -= impulseX / a.mass;
        a.vy -= impulseY / a.mass;
        b.vx += impulseX / b.mass;
        b.vy += impulseY / b.mass;

        const contactX = a.x + nx * a.r;
        const contactY = a.y + ny * a.r;
        emitCollision(contactX, contactY, a.color, b.color, nx, ny, -normalVelocity);
      }
    }
  }

  function updateParticles(dt) {
    for (let i = sparks.length - 1; i >= 0; i--) {
      const spark = sparks[i];
      spark.life -= dt;

      if (spark.life <= 0) {
        sparks.splice(i, 1);
        continue;
      }

      spark.x += spark.vx * dt;
      spark.y += spark.vy * dt;
      spark.vx *= Math.pow(0.08, dt);
      spark.vy *= Math.pow(0.08, dt);
    }

    for (let i = flashes.length - 1; i >= 0; i--) {
      flashes[i].life -= dt;
      if (flashes[i].life <= 0) flashes.splice(i, 1);
    }
  }

  function update(dt) {
    let maxSpeed = 0;
    let minimumRadius = Infinity;

    for (const ball of balls) {
      maxSpeed = Math.max(maxSpeed, Math.hypot(ball.vx, ball.vy));
      minimumRadius = Math.min(minimumRadius, ball.r);
    }

    const required = Math.ceil((maxSpeed * dt) / Math.max(2, minimumRadius * 0.45));
    const substeps = Math.max(2, Math.min(10, required));
    const subDt = dt / substeps;

    for (let step = 0; step < substeps; step++) {
      for (const ball of balls) {
        ball.x += ball.vx * subDt;
        ball.y += ball.vy * subDt;
        resolveWalls(ball);
      }

      resolveBallCollisions();

      for (const ball of balls) resolveWalls(ball);
    }

    updateParticles(dt);
  }

  function drawArena() {
    ctx.save();
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#00ffff";
    ctx.lineWidth = 5;
    ctx.shadowColor = "#00ffff";
    ctx.shadowBlur = 18;
    ctx.strokeRect(
      arena.left,
      arena.top,
      arena.right - arena.left,
      arena.bottom - arena.top
    );

    ctx.strokeStyle = "#ff00ff";
    ctx.lineWidth = 2;
    ctx.shadowColor = "#ff00ff";
    ctx.shadowBlur = 8;
    ctx.strokeRect(
      arena.left + 5,
      arena.top + 5,
      arena.right - arena.left - 10,
      arena.bottom - arena.top - 10
    );
    ctx.restore();
  }

  function drawBalls() {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";

    for (const ball of balls) {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = ball.color;
      ctx.shadowColor = ball.color;
      ctx.shadowBlur = 18;
      ctx.fill();
    }

    ctx.restore();
  }

  function drawEffects() {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.lineCap = "round";

    for (const flash of flashes) {
      const alpha = flash.life / flash.maxLife;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = flash.color;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = flash.color;
      ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(
        flash.x,
        flash.y,
        flash.radius * (1.4 - alpha * 0.4),
        0,
        Math.PI * 2
      );
      ctx.stroke();
    }

    for (const spark of sparks) {
      const alpha = spark.life / spark.maxLife;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = spark.color;
      ctx.lineWidth = spark.size;
      ctx.shadowColor = spark.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(spark.x, spark.y);
      ctx.lineTo(
        spark.x - spark.vx * 0.025,
        spark.y - spark.vy * 0.025
      );
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawHud() {
    ctx.save();
    ctx.fillStyle = "#39ff14";
    ctx.shadowColor = "#39ff14";
    ctx.shadowBlur = 9;
    ctx.textBaseline = "top";
    ctx.font = "bold 20px monospace";
    ctx.fillText("NEON COLLISION", 18, 14);

    ctx.font = "bold 14px monospace";
    ctx.fillText("COLLISIONS  " + String(collisions).padStart(8, "0"), 18, 43);
    ctx.fillText("BALLS       " + String(balls.length).padStart(8, "0"), 18, 62);
    ctx.restore();
  }

  function drawScanlines() {
    ctx.save();
    ctx.globalAlpha = 0.12;
    ctx.fillStyle = "#8aff8a";

    for (let y = 0; y < height; y += 4) {
      ctx.fillRect(0, y, width, 1);
    }

    ctx.restore();
  }

  function drawVignette() {
    const gradient = ctx.createRadialGradient(
      width * 0.5,
      height * 0.5,
      Math.min(width, height) * 0.2,
      width * 0.5,
      height * 0.5,
      Math.max(width, height) * 0.72
    );
    gradient.addColorStop(0, "rgba(0,0,0,0)");
    gradient.addColorStop(0.72, "rgba(0,0,0,0.08)");
    gradient.addColorStop(1, "rgba(0,0,0,0.58)");

    ctx.save();
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);
    ctx.restore();
  }

  function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, width, height);

    drawArena();
    drawEffects();
    drawBalls();
    drawHud();
    drawScanlines();
    drawVignette();
  }

  function frame(now) {
    const elapsed = Math.min(0.1, (now - previousTime) / 1000);
    previousTime = now;
    accumulator += elapsed;

    while (accumulator >= FIXED_STEP) {
      update(FIXED_STEP);
      accumulator -= FIXED_STEP;
    }

    render();
    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
