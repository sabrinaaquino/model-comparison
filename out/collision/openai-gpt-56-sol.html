<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title></title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#57bdf2}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  let W = 0, H = 0, DPR = 1;
  let groundY = 0, launchY = 0, leftLaunchX = 0, rightLaunchX = 0;
  let lastTime = performance.now();
  let state = "run";
  let stateTime = 0;
  let particles = [];
  let flash = null;

  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const rand = (a, b) => a + Math.random() * (b - a);

  const cars = [
    {
      side: 1,
      color: "#e8342f",
      dark: "#a7111c",
      light: "#ff7770",
      x: 0, y: 0, vx: 0, vy: 0,
      angle: 0, spin: 0, wheel: 0,
      grounded: true, settled: false,
      squash: 1, stretch: 1
    },
    {
      side: -1,
      color: "#1689e8",
      dark: "#0758a7",
      light: "#72caff",
      x: 0, y: 0, vx: 0, vy: 0,
      angle: 0, spin: 0, wheel: 0,
      grounded: true, settled: false,
      squash: 1, stretch: 1
    }
  ];

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    groundY = H * 0.84;
    launchY = H * 0.57;
    const gap = clamp(W * 0.32, 250, 430);
    leftLaunchX = W * 0.5 - gap * 0.5;
    rightLaunchX = W * 0.5 + gap * 0.5;
    reset();
  }

  function rampStart(side) {
    return side === 1
      ? { x: Math.max(55, W * 0.055), y: groundY - 24 }
      : { x: Math.min(W - 55, W * 0.945), y: groundY - 24 };
  }

  function rampEnd(side) {
    return side === 1
      ? { x: leftLaunchX, y: launchY }
      : { x: rightLaunchX, y: launchY };
  }

  function reset() {
    particles = [];
    flash = null;
    state = "run";
    stateTime = 0;

    for (const car of cars) {
      const p = rampStart(car.side);
      const e = rampEnd(car.side);
      car.x = p.x;
      car.y = p.y;
      car.vx = car.vy = car.spin = 0;
      car.angle = Math.atan2(e.y - p.y, e.x - p.x);
      car.wheel = 0;
      car.grounded = true;
      car.settled = false;
      car.squash = 1;
      car.stretch = 1;
    }
  }

  function roundedRect(x, y, w, h, r) {
    r = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function spawnDust(x, y, direction, amount = 14) {
    for (let i = 0; i < amount; i++) {
      particles.push({
        type: "dust",
        x: x + rand(-15, 15),
        y: y + rand(-5, 6),
        vx: rand(-70, 40) * direction,
        vy: rand(-90, -20),
        gravity: 80,
        life: rand(0.5, 0.95),
        maxLife: 1,
        size: rand(5, 13),
        color: Math.random() < 0.5 ? "#dcc18a" : "#b98c4b",
        spin: 0,
        angle: 0
      });
    }
  }

  function spawnCrash(x, y) {
    const debrisColors = ["#e8342f", "#1689e8", "#292929", "#f7d348", "#d6d6d6"];
    for (let i = 0; i < 28; i++) {
      const a = rand(0, Math.PI * 2);
      const speed = rand(110, 390);
      particles.push({
        type: "debris",
        x, y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed - 80,
        gravity: 650,
        life: rand(0.9, 1.8),
        maxLife: 1.8,
        size: rand(3, 8),
        color: debrisColors[(Math.random() * debrisColors.length) | 0],
        angle: rand(0, Math.PI * 2),
        spin: rand(-12, 12)
      });
    }

    for (let i = 0; i < 36; i++) {
      const a = rand(0, Math.PI * 2);
      const speed = rand(170, 520);
      particles.push({
        type: "spark",
        x, y,
        vx: Math.cos(a) * speed,
        vy: Math.sin(a) * speed,
        gravity: 360,
        life: rand(0.25, 0.7),
        maxLife: 0.7,
        size: rand(1.5, 3.5),
        color: Math.random() < 0.4 ? "#fff8a6" : "#ffbf24",
        angle: a,
        spin: 0
      });
    }

    flash = { x, y, life: 0.34, maxLife: 0.34 };
  }

  function launchCars() {
    state = "air";
    stateTime = 0;

    const travelTime = 0.68;
    const horizontalDistance = (rightLaunchX - leftLaunchX - 66) * 0.5;
    const speed = horizontalDistance / travelTime;
    const upward = clamp(H * 0.4, 245, 350);

    cars[0].vx = speed;
    cars[1].vx = -speed;
    cars[0].vy = cars[1].vy = -upward;

    for (const car of cars) {
      car.grounded = false;
      car.stretch = 1.22;
      car.squash = 0.84;
      spawnDust(car.x - car.side * 22, car.y + 17, -car.side, 18);
    }
  }

  function crash() {
    state = "crash";
    stateTime = 0;
    const x = (cars[0].x + cars[1].x) * 0.5;
    const y = (cars[0].y + cars[1].y) * 0.5;

    cars[0].vx = -clamp(W * 0.19, 145, 220);
    cars[1].vx = clamp(W * 0.19, 145, 220);
    cars[0].vy = -145;
    cars[1].vy = -180;
    cars[0].spin = -5.3;
    cars[1].spin = 5.6;

    for (const car of cars) {
      car.squash = 0.7;
      car.stretch = 1.28;
    }
    spawnCrash(x, y);
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        particles.splice(i, 1);
        continue;
      }
      p.vy += p.gravity * dt;
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.angle += p.spin * dt;
      if (p.type === "dust") {
        p.vx *= Math.pow(0.3, dt);
        p.vy *= Math.pow(0.55, dt);
        p.size += 11 * dt;
      }
      if (p.type === "debris" && p.y > groundY - 2) {
        p.y = groundY - 2;
        p.vy *= -0.35;
        p.vx *= 0.72;
        p.spin *= 0.75;
      }
    }
    if (flash) {
      flash.life -= dt;
      if (flash.life <= 0) flash = null;
    }
  }

  function update(dt) {
    stateTime += dt;
    const gravity = clamp(H * 1.15, 650, 900);

    if (state === "run") {
      let allAtEnd = true;
      for (const car of cars) {
        const s = rampStart(car.side);
        const e = rampEnd(car.side);
        const dx = e.x - s.x;
        const dy = e.y - s.y;
        const length = Math.hypot(dx, dy);
        const speed = clamp(W * 0.28, 210, 340);
        car.progress = clamp((stateTime * speed) / length, 0, 1);
        const ease = car.progress * car.progress * (3 - 2 * car.progress);
        car.x = s.x + dx * ease;
        car.y = s.y + dy * ease;
        car.angle = Math.atan2(dy, dx);
        car.wheel += speed * dt / 11 * car.side;
        car.squash += (1 - car.squash) * 9 * dt;
        car.stretch += (1 - car.stretch) * 9 * dt;
        if (car.progress < 1) allAtEnd = false;
      }
      if (allAtEnd) launchCars();
    } else {
      for (const car of cars) {
        if (!car.settled) {
          car.vy += gravity * dt;
          car.x += car.vx * dt;
          car.y += car.vy * dt;
          car.angle += car.spin * dt;
          car.wheel += car.vx * dt / 11;
          car.squash += (1 - car.squash) * 7 * dt;
          car.stretch += (1 - car.stretch) * 7 * dt;

          const floor = groundY - 20;
          if (car.y >= floor && car.vy > 0) {
            car.y = floor;
            if (Math.abs(car.vy) > 65) {
              car.vy *= -0.28;
              car.vx *= 0.68;
              car.spin *= 0.58;
              car.squash = 1.22;
              car.stretch = 0.82;
              spawnDust(car.x, groundY - 2, car.vx < 0 ? 1 : -1, 8);
            } else {
              car.vy = 0;
              car.vx *= Math.pow(0.06, dt);
              car.spin *= Math.pow(0.035, dt);
              const quarter = Math.PI * 0.5;
              const target = Math.round(car.angle / quarter) * quarter;
              car.angle += (target - car.angle) * 5 * dt;
              if (Math.abs(car.vx) < 3 && Math.abs(car.spin) < 0.05) {
                car.vx = 0;
                car.spin = 0;
                car.settled = true;
              }
            }
          }
        }
      }

      if (state === "air") {
        const dx = cars[1].x - cars[0].x;
        const dy = cars[1].y - cars[0].y;
        if (Math.hypot(dx, dy) < 72 || dx <= 65) crash();
      }

      if (state === "crash" && stateTime > 4.2) reset();
    }

    updateParticles(dt);
  }

  function drawSky() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, "#178ee5");
    sky.addColorStop(0.58, "#72cef5");
    sky.addColorStop(1, "#c3ecff");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = "rgba(255,255,255,0.88)";
    const clouds = [
      [W * 0.14, H * 0.16, 1],
      [W * 0.73, H * 0.22, 0.82],
      [W * 0.47, H * 0.1, 0.58]
    ];
    for (const [x, y, s] of clouds) {
      ctx.beginPath();
      ctx.arc(x, y, 27 * s, Math.PI, 0);
      ctx.arc(x + 29 * s, y - 12 * s, 34 * s, Math.PI, 0);
      ctx.arc(x + 68 * s, y, 25 * s, Math.PI, 0);
      ctx.lineTo(x + 68 * s, y + 15 * s);
      ctx.lineTo(x, y + 15 * s);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawTerrain() {
    const dirt = ctx.createLinearGradient(0, launchY, 0, H);
    dirt.addColorStop(0, "#b57935");
    dirt.addColorStop(1, "#70421e");

    ctx.fillStyle = dirt;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(0, H);
    ctx.lineTo(W, H);
    ctx.lineTo(W, groundY);
    ctx.lineTo(rightLaunchX, launchY + 18);
    ctx.lineTo(rightLaunchX - 23, launchY + 42);
    ctx.lineTo(W * 0.58, groundY);
    ctx.lineTo(W * 0.42, groundY);
    ctx.lineTo(leftLaunchX + 23, launchY + 42);
    ctx.lineTo(leftLaunchX, launchY + 18);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#52b83d";
    ctx.beginPath();
    ctx.moveTo(0, groundY - 18);
    ctx.lineTo(leftLaunchX, launchY - 10);
    ctx.lineTo(leftLaunchX + 16, launchY + 8);
    ctx.lineTo(0, groundY + 5);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(W, groundY - 18);
    ctx.lineTo(rightLaunchX, launchY - 10);
    ctx.lineTo(rightLaunchX - 16, launchY + 8);
    ctx.lineTo(W, groundY + 5);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#5fc943";
    ctx.fillRect(0, groundY - 8, W, 12);

    ctx.strokeStyle = "#2e8d2b";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, groundY - 18);
    ctx.lineTo(leftLaunchX, launchY - 10);
    ctx.moveTo(rightLaunchX, launchY - 10);
    ctx.lineTo(W, groundY - 18);
    ctx.stroke();

    ctx.fillStyle = "rgba(85,47,20,0.55)";
    for (let x = 18; x < W; x += 45) {
      const y = groundY + 25 + ((x * 17) % Math.max(30, H - groundY - 45));
      ctx.beginPath();
      ctx.ellipse(x, y, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const alpha = clamp(p.life / p.maxLife, 0, 1);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle);
      ctx.fillStyle = p.color;

      if (p.type === "dust") {
        ctx.beginPath();
        ctx.arc(0, 0, p.size, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === "spark") {
        ctx.strokeStyle = p.color;
        ctx.lineWidth = p.size;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-p.vx * 0.025, -p.vy * 0.025);
        ctx.lineTo(0, 0);
        ctx.stroke();
      } else {
        ctx.fillRect(-p.size * 0.65, -p.size * 0.45, p.size * 1.3, p.size * 0.9);
      }
      ctx.restore();
    }
  }

  function drawWheel(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = "#15171a";
    ctx.beginPath();
    ctx.arc(0, 0, 11, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#8f9ba3";
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "#dbe2e5";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(5, 0);
    ctx.moveTo(0, -5); ctx.lineTo(0, 5);
    ctx.stroke();
    ctx.restore();
  }

  function drawCar(car) {
    ctx.save();
    ctx.translate(car.x, car.y);

    ctx.save();
    ctx.rotate(-car.angle);
    const altitude = Math.max(0, groundY - car.y - 20);
    const shadowScale = clamp(1 - altitude / 500, 0.45, 1);
    ctx.translate(0, altitude + 23);
    ctx.scale(shadowScale, shadowScale * 0.38);
    ctx.filter = "blur(5px)";
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = "#172226";
    ctx.beginPath();
    ctx.ellipse(0, 0, 39, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    ctx.rotate(car.angle);
    ctx.scale(car.side, 1);
    ctx.scale(car.stretch, car.squash);

    drawWheel(-23, 13, car.wheel * car.side);
    drawWheel(24, 13, car.wheel * car.side);

    ctx.fillStyle = car.dark;
    roundedRect(-39, -7, 78, 25, 9);
    ctx.fill();

    ctx.fillStyle = car.color;
    ctx.beginPath();
    ctx.moveTo(-39, 6);
    ctx.quadraticCurveTo(-36, -8, -22, -10);
    ctx.lineTo(-12, -25);
    ctx.quadraticCurveTo(-8, -31, 3, -31);
    ctx.lineTo(20, -29);
    ctx.quadraticCurveTo(28, -27, 35, -12);
    ctx.quadraticCurveTo(42, -8, 42, 5);
    ctx.lineTo(39, 11);
    ctx.lineTo(-38, 11);
    ctx.quadraticCurveTo(-43, 8, -39, 6);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = car.dark;
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#9be5ff";
    ctx.beginPath();
    ctx.moveTo(-9, -25);
    ctx.lineTo(0, -25);
    ctx.lineTo(0, -12);
    ctx.lineTo(-18, -12);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = "#67c1e8";
    ctx.beginPath();
    ctx.moveTo(4, -25);
    ctx.lineTo(18, -23);
    ctx.quadraticCurveTo(23, -20, 28, -12);
    ctx.lineTo(4, -12);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#28546b";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = car.light;
    ctx.globalAlpha = 0.72;
    ctx.beginPath();
    ctx.moveTo(-31, -4);
    ctx.quadraticCurveTo(-10, -14, 31, -8);
    ctx.lineTo(26, -3);
    ctx.quadraticCurveTo(-5, -8, -31, 2);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = "#fff5b8";
    roundedRect(34, -4, 7, 7, 2);
    ctx.fill();

    ctx.fillStyle = "#ff9c35";
    roundedRect(-41, -3, 6, 7, 2);
    ctx.fill();

    ctx.restore();
  }

  function drawFlash() {
    if (!flash) return;
    const t = flash.life / flash.maxLife;
    const r1 = 72 * (1.15 - t * 0.15);
    const r2 = 31 * (1.15 - t * 0.15);
    ctx.save();
    ctx.translate(flash.x, flash.y);
    ctx.rotate((1 - t) * 1.6);
    ctx.globalAlpha = clamp(t * 1.6, 0, 1);

    ctx.fillStyle = "#fff36a";
    ctx.strokeStyle = "#ff8b18";
    ctx.lineWidth = 5;
    ctx.beginPath();
    for (let i = 0; i < 20; i++) {
      const a = -Math.PI / 2 + i * Math.PI / 10;
      const r = i % 2 === 0 ? r1 : r2;
      const x = Math.cos(a) * r;
      const y = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function render() {
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.clearRect(0, 0, W, H);
    drawSky();
    drawTerrain();
    drawParticles();
    drawCar(cars[0]);
    drawCar(cars[1]);
    drawFlash();
  }

  function frame(now) {
    const dt = Math.min((now - lastTime) / 1000, 1 / 30);
    lastTime = now;
    update(dt);
    render();
    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
