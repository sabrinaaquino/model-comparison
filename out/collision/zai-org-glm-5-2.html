<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Colisões - Bolhas Saltitantes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #5fb8ff; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0;
  let playX, playY, playW, playH;
  const FRAME = 22;
  const BALL_COUNT = 40;

  // Bright cartoon palette for marbles
  const PALETTE = [
    { a: '#ff5757', b: '#b81f1f' }, // red
    { a: '#5fb8ff', b: '#1a6cc4' }, // blue
    { a: '#5dd66c', b: '#1f8a2e' }, // green
    { a: '#ffd23d', b: '#c7950a' }, // yellow
    { a: '#c66bff', b: '#7a2bc4' }, // purple
    { a: '#ff9a3d', b: '#c25a0a' }, // orange
    { a: '#ff5fb0', b: '#c41f7a' }, // pink
    { a: '#3dd6d6', b: '#1f8a8a' }  // cyan
  ];

  // Pre-rendered gradient per ball (cached for performance)
  let gradCache = [];
  function buildGrads() {
    gradCache = balls.map(b => {
      const g = ctx.createRadialGradient(
        b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.05,
        b.x, b.y, b.r
      );
      g.addColorStop(0, '#ffffff');
      g.addColorStop(0.18, b.col.a);
      g.addColorStop(0.85, b.col.b);
      g.addColorStop(1, b.col.b);
      return g;
    });
  }

  let balls = [];
  let collisions = 0;
  let particles = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    const pad = 24;
    const maxW = 1100;
    const maxH = 720;
    playW = Math.min(maxW, W - pad * 2);
    playH = Math.min(maxH, H - pad * 2);
    playX = Math.round((W - playW) / 2);
    playY = Math.round((H - playH) / 2);
    // Clamp balls inside new bounds
    for (const b of balls) {
      b.x = Math.max(playX + b.r + 2, Math.min(playX + playW - b.r - 2, b.x));
      b.y = Math.max(playY + b.r + 2, Math.min(playY + playH - b.r - 2, b.y));
    }
    buildGrads();
  }
  window.addEventListener('resize', resize);

  function rand(a, b) { return a + Math.random() * (b - a); }

  function initBalls() {
    balls = [];
    const minR = 14, maxR = 34;
    let attempts = 0;
    while (balls.length < BALL_COUNT && attempts < 6000) {
      attempts++;
      const r = rand(minR, maxR);
      const x = rand(playX + r + 4, playX + playW - r - 4);
      const y = rand(playY + r + 4, playY + playH - r - 4);
      let ok = true;
      for (const o of balls) {
        const dx = x - o.x, dy = y - o.y;
        if (dx * dx + dy * dy < (r + o.r + 4) * (r + o.r + 4)) { ok = false; break; }
      }
      if (!ok) continue;
      const speed = rand(110, 220);
      const ang = rand(0, Math.PI * 2);
      balls.push({
        x, y, r,
        vx: Math.cos(ang) * speed,
        vy: Math.sin(ang) * speed,
        col: PALETTE[(Math.random() * PALETTE.length) | 0],
        squash: 0,
        sqAng: 0
      });
    }
    buildGrads();
  }

  function roundRect(x, y, w, h, r) {
    r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  function drawBackground() {
    // Cheerful sky gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#7ec8ff');
    g.addColorStop(0.55, '#a8dbff');
    g.addColorStop(1, '#d6efff');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // Soft playful clouds
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    const t = performance.now() * 0.000015;
    for (let i = 0; i < 6; i++) {
      const cx = ((i * 240 + t * 60) % (W + 240)) - 120;
      const cy = 60 + i * 38 + Math.sin(i * 1.3) * 12;
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, Math.PI * 2);
      ctx.arc(cx + 22, cy + 4, 18, 0, Math.PI * 2);
      ctx.arc(cx - 22, cy + 6, 16, 0, Math.PI * 2);
      ctx.arc(cx + 4, cy - 10, 14, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawFrame() {
    // Outer drop shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.28)';
    ctx.shadowBlur = 18;
    ctx.shadowOffsetY = 8;
    ctx.fillStyle = '#2a6fc4';
    roundRect(playX - FRAME, playY - FRAME, playW + FRAME * 2, playH + FRAME * 2, FRAME + 8);
    ctx.fill();
    ctx.restore();

    // Bevel: dark outer ring
    ctx.strokeStyle = '#154a8a';
    ctx.lineWidth = 4;
    roundRect(playX - FRAME + 4, playY - FRAME + 4, playW + FRAME * 2 - 8, playH + FRAME * 2 - 8, FRAME + 4);
    ctx.stroke();

    // Bright top-left highlight
    ctx.strokeStyle = '#bfe2ff';
    ctx.lineWidth = 3;
    roundRect(playX - FRAME + 2, playY - FRAME + 2, playW + FRAME * 2 - 4, playH + FRAME * 2 - 4, FRAME + 6);
    ctx.stroke();

    // Inner play-area inset shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.22)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 3;
    ctx.fillStyle = '#eaf7ff';
    roundRect(playX, playY, playW, playH, 14);
    ctx.fill();
    ctx.restore();

    // Inner subtle border
    ctx.strokeStyle = '#9fd0ee';
    ctx.lineWidth = 2;
    roundRect(playX + 1, playY + 1, playW - 2, playH - 2, 13);
    ctx.stroke();
  }

  function drawBall(b, i) {
    const g = gradCache[i];
    if (!g) return;

    // Drop shadow beneath ball
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.20)';
    ctx.beginPath();
    ctx.ellipse(b.x, b.y + b.r * 0.85, b.r * 0.95, b.r * 0.28, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // Squash transform
    ctx.save();
    ctx.translate(b.x, b.y);
    if (b.squash > 0.001) {
      const sx = 1 + b.squash * 0.28;
      const sy = 1 - b.squash * 0.28;
      ctx.rotate(b.sqAng);
      ctx.scale(sx, sy);
      ctx.rotate(-b.sqAng);
    }
    ctx.translate(-b.x, -b.y);

    // Body
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();

    // Rim shading (bottom-right)
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r - 0.75, Math.PI * 0.15, Math.PI * 0.85);
    ctx.stroke();

    // Specular highlight (top-left)
    const hr = b.r * 0.42;
    const hg = ctx.createRadialGradient(
      b.x - b.r * 0.38, b.y - b.r * 0.38, 0,
      b.x - b.r * 0.38, b.y - b.r * 0.38, hr
    );
    hg.addColorStop(0, 'rgba(255,255,255,0.95)');
    hg.addColorStop(0.55, 'rgba(255,255,255,0.35)');
    hg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hg;
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.38, b.y - b.r * 0.38, hr, 0, Math.PI * 2);
    ctx.fill();

    // Tiny sharp glint
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.5, b.y - b.r * 0.5, b.r * 0.12, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawParticles() {
    for (const p of particles) {
      const a = p.life / p.maxLife;
      ctx.fillStyle = 'rgba(255,255,255,' + (a * 0.95).toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * a + 0.5, 0, Math.PI * 2);
      ctx.fill();
      // cross sparkle
      ctx.strokeStyle = 'rgba(255,255,255,' + (a * 0.7).toFixed(3) + ')';
      ctx.lineWidth = 1.2;
      const s = p.r * a * 2.4;
      ctx.beginPath();
      ctx.moveTo(p.x - s, p.y); ctx.lineTo(p.x + s, p.y);
      ctx.moveTo(p.x, p.y - s); ctx.lineTo(p.x, p.y + s);
      ctx.stroke();
    }
  }

  function drawHUD() {
    const pw = 200, ph = 96;
    const px = 20, py = 20;

    // Shadow
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.35)';
    ctx.shadowBlur = 12;
    ctx.shadowOffsetY = 6;
    ctx.fillStyle = '#ffce3d';
    roundRect(px, py, pw, ph, 16);
    ctx.fill();
    ctx.restore();

    // Bevel dark
    ctx.strokeStyle = '#c7950a';
    ctx.lineWidth = 3;
    roundRect(px + 1.5, py + 1.5, pw - 3, ph - 3, 14);
    ctx.stroke();
    // Bevel light
    ctx.strokeStyle = '#fff3b0';
    ctx.lineWidth = 2;
    roundRect(px + 3, py + 3, pw - 6, ph - 6, 12);
    ctx.stroke();

    // Inner panel
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    roundRect(px + 8, py + 8, pw - 16, ph - 16, 10);
    ctx.fill();

    // Text
    ctx.fillStyle = '#5a3a05';
    ctx.font = 'bold 14px "Trebuchet MS", "Verdana", sans-serif';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';

    ctx.fillText('COLISOES', px + 16, py + 30);
    ctx.fillStyle = '#b81f1f';
    ctx.font = 'bold 26px "Trebuchet MS", "Verdana", sans-serif';
    ctx.fillText(String(collisions), px + 110, py + 30);

    ctx.fillStyle = '#5a3a05';
    ctx.font = 'bold 14px "Trebuchet MS", "Verdana", sans-serif';
    ctx.fillText('BOLAS', px + 16, py + 68);
    ctx.fillStyle = '#1f6a2e';
    ctx.font = 'bold 26px "Trebuchet MS", "Verdana", sans-serif';
    ctx.fillText(String(balls.length), px + 110, py + 68);
  }

  function spawnSparkle(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(40, 140);
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        r: rand(1.5, 3.5),
        life: rand(0.25, 0.5),
        maxLife: 0.5
      });
    }
  }

  function step(dt) {
    // Integrate
    for (const b of balls) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.squash > 0) b.squash = Math.max(0, b.squash - dt * 5.5);
    }

    // Walls (reflect + clamp to prevent tunneling)
    for (const b of balls) {
      if (b.x - b.r < playX) {
        b.x = playX + b.r;
        if (b.vx < 0) {
          b.vx = -b.vx;
          b.squash = 1; b.sqAng = 0;
          spawnSparkle(playX + 2, b.y, 3);
        }
      } else if (b.x + b.r > playX + playW) {
        b.x = playX + playW - b.r;
        if (b.vx > 0) {
          b.vx = -b.vx;
          b.squash = 1; b.sqAng = 0;
          spawnSparkle(playX + playW - 2, b.y, 3);
        }
      }
      if (b.y - b.r < playY) {
        b.y = playY + b.r;
        if (b.vy < 0) {
          b.vy = -b.vy;
          b.squash = 1; b.sqAng = Math.PI / 2;
          spawnSparkle(b.x, playY + 2, 3);
        }
      } else if (b.y + b.r > playY + playH) {
        b.y = playY + playH - b.r;
        if (b.vy > 0) {
          b.vy = -b.vy;
          b.squash = 1; b.sqAng = Math.PI / 2;
          spawnSparkle(b.x, playY + playH - 2, 3);
        }
      }
    }

    // Ball-ball elastic collisions
    const n = balls.length;
    for (let i = 0; i < n; i++) {
      const a = balls[i];
      for (let j = i + 1; j < n; j++) {
        const b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const minD = a.r + b.r;
        const d2 = dx * dx + dy * dy;
        if (d2 < minD * minD && d2 > 0.0001) {
          const d = Math.sqrt(d2);
          const nx = dx / d;
          const ny = dy / d;
          // Separate proportionally to radius
          const overlap = (minD - d) * 0.5;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
          // Relative velocity along normal
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const vn = rvx * nx + rvy * ny;
          if (vn < 0) {
            // Equal mass elastic exchange of normal component
            const imp = vn;
            a.vx += imp * nx;
            a.vy += imp * ny;
            b.vx -= imp * nx;
            b.vy -= imp * ny;
            // Juice
            const cx = (a.x + b.x) * 0.5;
            const cy = (a.y + b.y) * 0.5;
            const ang = Math.atan2(ny, nx);
            a.squash = 1; a.sqAng = ang;
            b.squash = 1; b.sqAng = ang;
            spawnSparkle(cx, cy, 5);
            collisions++;
          }
        }
      }
    }

    // Particles
    for (const p of particles) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);
  }

  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05; // clamp for stability
    // Sub-step for accuracy with fast small balls
    const sub = 2;
    const sdt = dt / sub;
    for (let s = 0; s < sub; s++) step(sdt);

    drawBackground();
    drawFrame();
    for (let i = 0; i < balls.length; i++) drawBall(balls[i], i);
    drawParticles();
    drawHUD();

    requestAnimationFrame(loop);
  }

  // Boot
  resize();
  initBalls();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
