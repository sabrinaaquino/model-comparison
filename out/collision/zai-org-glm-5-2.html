<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NEON ARENA</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W = 0, H = 0;
  let arena = { x: 0, y: 0, w: 0, h: 0 };

  // Neon arcade palette
  const PALETTE = ['#00ffff', '#ff00ff', '#ffff00', '#39ff14', '#ff7700'];
  const BALL_COUNT = 40;

  let balls = [];
  let sparks = [];
  let flashes = [];
  let collisions = 0;

  // Pre-rendered scanline strip (cached for performance)
  const scan = document.createElement('canvas');
  scan.width = 1;
  scan.height = 3;
  {
    const sctx = scan.getContext('2d');
    sctx.fillStyle = 'rgba(0,0,0,0.35)';
    sctx.fillRect(0, 0, 1, 1);
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    const marginX = Math.max(40, W * 0.06);
    const marginY = Math.max(110, H * 0.14);
    arena = {
      x: marginX,
      y: marginY,
      w: W - marginX * 2,
      h: H - marginY * 2
    };
    // Clamp any balls that ended up outside the new arena
    for (const b of balls) {
      b.x = Math.max(arena.x + b.r, Math.min(arena.x + arena.w - b.r, b.x));
      b.y = Math.max(arena.y + b.r, Math.min(arena.y + arena.h - b.r, b.y));
    }
  }

  function rand(a, b) { return a + Math.random() * (b - a); }
  function pick(arr) { return arr[(Math.random() * arr.length) | 0]; }

  function makeBall() {
    let r = rand(8, 22);
    let x, y, ok, tries = 0;
    do {
      x = arena.x + r + Math.random() * (arena.w - r * 2);
      y = arena.y + r + Math.random() * (arena.h - r * 2);
      ok = true;
      for (const o of balls) {
        const dx = o.x - x, dy = o.y - y;
        if (dx * dx + dy * dy < (o.r + r + 2) * (o.r + r + 2)) { ok = false; break; }
      }
      tries++;
    } while (!ok && tries < 200);
    const ang = Math.random() * Math.PI * 2;
    const speed = rand(120, 260);
    return {
      x, y,
      vx: Math.cos(ang) * speed,
      vy: Math.sin(ang) * speed,
      r,
      color: pick(PALETTE),
      trail: []
    };
  }

  function init() {
    resize();
    balls = [];
    sparks = [];
    flashes = [];
    collisions = 0;
    for (let i = 0; i < BALL_COUNT; i++) balls.push(makeBall());
  }

  function emitSparks(x, y, color, n) {
    n = n || 6;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = rand(60, 220);
      sparks.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: rand(0.25, 0.55),
        maxLife: 0.55,
        color
      });
    }
  }

  function emitFlash(x, y, color, size) {
    flashes.push({ x, y, color, life: 0.18, maxLife: 0.18, size: size || 16 });
  }

  function step(dt) {
    // Move
    for (const b of balls) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;

      // Walls — reflect, never tunnel
      if (b.x - b.r < arena.x) {
        b.x = arena.x + b.r;
        b.vx = Math.abs(b.vx);
        emitSparks(b.x - b.r * 0.4, b.y, b.color, 4);
        emitFlash(arena.x + 2, b.y, b.color, b.r * 1.6);
        collisions++;
      } else if (b.x + b.r > arena.x + arena.w) {
        b.x = arena.x + arena.w - b.r;
        b.vx = -Math.abs(b.vx);
        emitSparks(b.x + b.r * 0.4, b.y, b.color, 4);
        emitFlash(arena.x + arena.w - 2, b.y, b.color, b.r * 1.6);
        collisions++;
      }
      if (b.y - b.r < arena.y) {
        b.y = arena.y + b.r;
        b.vy = Math.abs(b.vy);
        emitSparks(b.x, b.y - b.r * 0.4, b.color, 4);
        emitFlash(b.x, arena.y + 2, b.color, b.r * 1.6);
        collisions++;
      } else if (b.y + b.r > arena.y + arena.h) {
        b.y = arena.y + arena.h - b.r;
        b.vy = -Math.abs(b.vy);
        emitSparks(b.x, b.y + b.r * 0.4, b.color, 4);
        emitFlash(b.x, arena.y + arena.h - 2, b.color, b.r * 1.6);
        collisions++;
      }

      // Trail
      b.trail.push(b.x, b.y);
      if (b.trail.length > 36) b.trail.splice(0, b.trail.length - 36);
    }

    // Ball-ball elastic collisions
    for (let i = 0; i < balls.length; i++) {
      const a = balls[i];
      for (let j = i + 1; j < balls.length; j++) {
        const b = balls[j];
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const d2 = dx * dx + dy * dy;
        const minD = a.r + b.r;
        if (d2 < minD * minD && d2 > 0.000001) {
          const d = Math.sqrt(d2);
          const nx = dx / d;
          const ny = dy / d;
          // Separate (prevent overlap/stick)
          const overlap = (minD - d) * 0.5;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
          // Relative velocity along normal
          const rvx = b.vx - a.vx;
          const rvy = b.vy - a.vy;
          const vn = rvx * nx + rvy * ny;
          if (vn < 0) {
            // Equal mass elastic: swap normal components
            a.vx += vn * nx;
            a.vy += vn * ny;
            b.vx -= vn * nx;
            b.vy -= vn * ny;
            const cx = (a.x + b.x) * 0.5;
            const cy = (a.y + b.y) * 0.5;
            emitSparks(cx, cy, a.color, 3);
            emitSparks(cx, cy, b.color, 3);
            emitFlash(cx, cy, '#ffffff', (a.r + b.r) * 0.9);
            collisions++;
          }
        }
      }
    }

    // Sparks
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vx *= 0.92;
      s.vy *= 0.92;
      s.life -= dt;
      if (s.life <= 0) sparks.splice(i, 1);
    }

    // Flashes
    for (let i = flashes.length - 1; i >= 0; i--) {
      flashes[i].life -= dt;
      if (flashes[i].life <= 0) flashes.splice(i, 1);
    }
  }

  function draw() {
    // Solid black background (no gradients)
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Arena interior subtle floor tint
    ctx.fillStyle = 'rgba(8, 6, 18, 1)';
    ctx.fillRect(arena.x, arena.y, arena.w, arena.h);

    // Neon border with additive glow halo
    ctx.save();
    ctx.shadowBlur = 24;
    ctx.shadowColor = '#00ffff';
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 3;
    ctx.strokeRect(arena.x, arena.y, arena.w, arena.h);
    ctx.restore();

    // Inner crisp border line
    ctx.strokeStyle = 'rgba(180, 255, 255, 0.85)';
    ctx.lineWidth = 1;
    ctx.strokeRect(arena.x, arena.y, arena.w, arena.h);

    // Motion trails (additive)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const b of balls) {
      const t = b.trail;
      if (t.length < 4) continue;
      ctx.strokeStyle = b.color;
      ctx.globalAlpha = 0.28;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(t[0], t[1]);
      for (let i = 2; i < t.length; i += 2) ctx.lineTo(t[i], t[i + 1]);
      ctx.stroke();
    }
    ctx.restore();

    // Sparks (additive)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const s of sparks) {
      const a = Math.max(0, s.life / s.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = s.color;
      ctx.shadowBlur = 8;
      ctx.shadowColor = s.color;
      ctx.fillRect(s.x - 1.5, s.y - 1.5, 3, 3);
    }
    ctx.restore();

    // Flashes (additive)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const f of flashes) {
      const a = Math.max(0, f.life / f.maxLife);
      const rad = f.size * (1.4 - a * 0.4);
      ctx.globalAlpha = a * 0.7;
      ctx.fillStyle = f.color;
      ctx.shadowBlur = 18;
      ctx.shadowColor = f.color;
      ctx.beginPath();
      ctx.arc(f.x, f.y, rad, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Balls with additive glow halos
    ctx.save();
    for (const b of balls) {
      ctx.shadowBlur = 22;
      ctx.shadowColor = b.color;
      ctx.fillStyle = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Inner bright cores (additive)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (const b of balls) {
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.beginPath();
      ctx.arc(b.x - b.r * 0.28, b.y - b.r * 0.28, b.r * 0.32, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // CRT scanlines overlay
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(scan, 0, 0, W, H);
    ctx.restore();

    // Vignette (radial darkening at edges)
    ctx.save();
    const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // HUD — chunky glowing green
    ctx.save();
    ctx.textBaseline = 'top';
    ctx.font = 'bold 22px "Courier New", monospace';
    ctx.shadowBlur = 14;
    ctx.shadowColor = '#39ff14';
    ctx.fillStyle = '#39ff14';
    ctx.fillText('NEON ARENA', 18, 18);

    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.shadowBlur = 8;
    ctx.fillText('COLLISIONS  : ' + collisions, 18, 50);
    ctx.fillText('BALLS       : ' + balls.length, 18, 70);
    ctx.restore();
  }

  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 0.05) dt = 0.05; // clamp for stability
    // Sub-step for stability with fast small balls
    const sub = 2;
    const sdt = dt / sub;
    for (let i = 0; i < sub; i++) step(sdt);
    draw();
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', resize);
  init();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
