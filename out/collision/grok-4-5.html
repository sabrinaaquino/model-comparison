<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Collider</title>
<style>
*{margin:0;padding:0;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const COLORS=['#00ffff','#ff00ff','#ffff00','#39ff14','#ff7700'];
const NUM_BALLS=40;
let W,H,arena={x:50,y:90,w:0,h:0};
let balls=[],particles=[],collisions=0,flash=0,last=performance.now();

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  arena.x=50;arena.y=90;
  arena.w=W-100;arena.h=H-140;
  for(const b of balls){
    b.x=Math.max(arena.x+b.r,Math.min(arena.x+arena.w-b.r,b.x));
    b.y=Math.max(arena.y+b.r,Math.min(arena.y+arena.h-b.r,b.y));
  }
}
window.addEventListener('resize',resize);

function initBalls(){
  balls.length=0;
  for(let i=0;i<NUM_BALLS;i++){
    const r=8+Math.random()*17;
    let x,y,ok=false,tries=0;
    while(!ok&&tries++<200){
      x=arena.x+r+Math.random()*(arena.w-2*r);
      y=arena.y+r+Math.random()*(arena.h-2*r);
      ok=!balls.some(b=>Math.hypot(b.x-x,b.y-y)<b.r+r+3);
    }
    const ang=Math.random()*Math.PI*2;
    const spd=1.5+Math.random()*3.5;
    balls.push({
      x,y,
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      r,mass:r*r,
      color:COLORS[i%COLORS.length]
    });
  }
}

function emitSparks(x,y,color){
  const n=6+Math.floor(Math.random()*6);
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const s=1.5+Math.random()*5;
    particles.push({
      x,y,
      vx:Math.cos(a)*s,
      vy:Math.sin(a)*s,
      life:1,
      decay:0.025+Math.random()*0.03,
      color,
      size:1.5+Math.random()*2
    });
  }
  if(particles.length>400)particles.splice(0,particles.length-400);
}

function resolveBallBall(a,b){
  let dx=b.x-a.x,dy=b.y-a.y;
  let dist=Math.hypot(dx,dy);
  const minD=a.r+b.r;
  if(dist>=minD||dist<1e-8)return false;
  const nx=dx/dist,ny=dy/dist;
  const overlap=minD-dist;
  const invM=1/(a.mass+b.mass);
  a.x-=nx*overlap*(b.mass*invM);
  a.y-=ny*overlap*(b.mass*invM);
  b.x+=nx*overlap*(a.mass*invM);
  b.y+=ny*overlap*(a.mass*invM);
  const dvx=a.vx-b.vx,dvy=a.vy-b.vy;
  const vn=dvx*nx+dvy*ny;
  if(vn>0)return false;
  const j=-(1+1)*vn/(1/a.mass+1/b.mass);
  a.vx+=(j/a.mass)*nx;
  a.vy+=(j/a.mass)*ny;
  b.vx-=(j/b.mass)*nx;
  b.vy-=(j/b.mass)*ny;
  return true;
}

function update(dt){
  const steps=3;
  const sdt=dt/steps;
  for(let s=0;s<steps;s++){
    for(const b of balls){
      b.x+=b.vx*sdt;
      b.y+=b.vy*sdt;
      let hit=false;
      if(b.x-b.r<arena.x){b.x=arena.x+b.r;if(b.vx<0){b.vx=-b.vx;hit=true;}}
      else if(b.x+b.r>arena.x+arena.w){b.x=arena.x+arena.w-b.r;if(b.vx>0){b.vx=-b.vx;hit=true;}}
      if(b.y-b.r<arena.y){b.y=arena.y+b.r;if(b.vy<0){b.vy=-b.vy;hit=true;}}
      else if(b.y+b.r>arena.y+arena.h){b.y=arena.y+arena.h-b.r;if(b.vy>0){b.vy=-b.vy;hit=true;}}
      if(hit){
        collisions++;
        emitSparks(
          Math.max(arena.x,Math.min(arena.x+arena.w,b.x)),
          Math.max(arena.y,Math.min(arena.y+arena.h,b.y)),
          b.color
        );
        flash=Math.max(flash,0.35);
      }
    }
    for(let i=0;i<balls.length;i++){
      for(let j=i+1;j<balls.length;j++){
        if(resolveBallBall(balls[i],balls[j])){
          collisions++;
          const mx=(balls[i].x+balls[j].x)*0.5;
          const my=(balls[i].y+balls[j].y)*0.5;
          emitSparks(mx,my,Math.random()<0.5?balls[i].color:balls[j].color);
          flash=Math.max(flash,0.45);
        }
      }
    }
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;
    p.y+=p.vy*dt;
    p.vx*=0.97;
    p.vy*=0.97;
    p.life-=p.decay*dt;
    if(p.life<=0)particles.splice(i,1);
  }
  flash*=Math.pow(0.88,dt);
}

function draw(){
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  const vg=ctx.createRadialGradient(W*0.5,H*0.5,Math.min(W,H)*0.25,W*0.5,H*0.5,Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(0.7,'rgba(0,0,0,0.15)');
  vg.addColorStop(1,'rgba(0,0,0,0.65)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.shadowBlur=28;
  ctx.shadowColor='#00ffff';
  ctx.strokeStyle='#00ffff';
  ctx.lineWidth=5;
  ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);
  ctx.shadowBlur=16;
  ctx.shadowColor='#ff00ff';
  ctx.strokeStyle='#ff00ff';
  ctx.lineWidth=2;
  ctx.strokeRect(arena.x+6,arena.y+6,arena.w-12,arena.h-12);
  ctx.shadowBlur=10;
  ctx.shadowColor='#39ff14';
  ctx.strokeStyle='rgba(57,255,20,0.5)';
  ctx.lineWidth=1;
  ctx.strokeRect(arena.x+10,arena.y+10,arena.w-20,arena.h-20);
  ctx.restore();

  for(const b of balls){
    ctx.save();
    ctx.shadowBlur=22;
    ctx.shadowColor=b.color;
    ctx.fillStyle=b.color;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.globalAlpha=0.55;
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.arc(b.x-b.r*0.28,b.y-b.r*0.28,b.r*0.35,0,Math.PI*2);
    ctx.fill();
    ctx.globalAlpha=0.25;
    ctx.beginPath();
    ctx.arc(b.x,b.y,b.r*0.7,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  for(const p of particles){
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    ctx.shadowBlur=10;
    ctx.shadowColor=p.color;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;
  ctx.shadowBlur=0;

  if(flash>0.02){
    ctx.fillStyle=`rgba(255,255,255,${flash*0.12})`;
    ctx.fillRect(arena.x,arena.y,arena.w,arena.h);
  }

  ctx.fillStyle='rgba(0,0,0,0.18)';
  for(let y=0;y<H;y+=3)ctx.fillRect(0,y,W,1);
  ctx.fillStyle='rgba(255,255,255,0.015)';
  for(let y=1;y<H;y+=3)ctx.fillRect(0,y,W,1);

  ctx.save();
  ctx.shadowBlur=12;
  ctx.shadowColor='#39ff14';
  ctx.fillStyle='#39ff14';
  ctx.font='bold 22px "Courier New",Courier,monospace';
  ctx.fillText('◆ NEON COLLIDER ◆',18,32);
  ctx.font='bold 14px "Courier New",Courier,monospace';
  ctx.fillText('COLLISIONS  '+collisions,18,56);
  ctx.fillText('BALLS       '+balls.length,18,76);
  ctx.restore();
}

function loop(now){
  let dt=(now-last)/16.6667;
  last=now;
  if(dt>3)dt=3;
  if(dt<0.05)dt=0.05;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

resize();
initBalls();
requestAnimationFrame(loop);
</script>
</body>
</html>
