<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Ramp Crash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#4a90d9}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,cx,cy;
const GRAV=1800;
const DT_MAX=1/30;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  cx=W/2;cy=H/2;
  layoutRamps();
}
window.addEventListener('resize',resize);

let rampL,rampR,groundY;

function layoutRamps(){
  groundY=H*0.82;
  const rampH=H*0.32;
  const rampBase=W*0.28;
  const launchGap=W*0.08;
  rampL={
    x0:W*0.04,y0:groundY,
    x1:cx-launchGap*0.5,y1:groundY-rampH,
    thick:28
  };
  rampR={
    x0:W*0.96,y0:groundY,
    x1:cx+launchGap*0.5,y1:groundY-rampH,
    thick:28
  };
}

function rampAngle(r){
  return Math.atan2(r.y1-r.y0,r.x1-r.x0);
}
function rampLen(r){
  const dx=r.x1-r.x0,dy=r.y1-r.y0;
  return Math.hypot(dx,dy);
}
function pointOnRamp(r,t){
  return{x:r.x0+(r.x1-r.x0)*t,y:r.y0+(r.y1-r.y0)*t};
}

const particles=[];
const sparks=[];
const dusts=[];
const stars=[];
let flashT=0;
let flashX=0,flashY=0;
let loopTimer=0;
let phase='run';

function spawnDust(x,y,n,dir){
  for(let i=0;i<n;i++){
    const a=dir+(Math.random()-0.5)*1.2;
    const sp=40+Math.random()*120;
    dusts.push({
      x,y,
      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp-30,
      life:0.4+Math.random()*0.5,
      max:0.4+Math.random()*0.5,
      r:4+Math.random()*8,
      col:`rgba(${180+Math.random()*40|0},${140+Math.random()*40|0},${80+Math.random()*30|0},`
    });
  }
}
function spawnDebris(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=120+Math.random()*380;
    const cols=['#e74c3c','#3498db','#f1c40f','#e67e22','#95a5a6','#2c3e50','#fff','#c0392b'];
    particles.push({
      x,y,
      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp-80,
      life:0.8+Math.random()*1.2,
      max:0.8+Math.random()*1.2,
      r:2+Math.random()*5,
      rot:Math.random()*Math.PI*2,
      vr:(Math.random()-0.5)*12,
      col:cols[Math.random()*cols.length|0],
      shape:Math.random()<0.5?0:1
    });
  }
}
function spawnSparks(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=200+Math.random()*500;
    sparks.push({
      x,y,
      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp,
      life:0.15+Math.random()*0.35,
      max:0.15+Math.random()*0.35,
      len:6+Math.random()*14
    });
  }
}
function spawnStar(x,y){
  stars.push({x,y,life:0.45,max:0.45,scale:1,rot:Math.random()*Math.PI});
}

function makeCar(side){
  const isL=side==='L';
  const ramp=isL?rampL:rampR;
  const ang=rampAngle(ramp);
  return{
    side,
    t:0.02,
    x:0,y:0,
    vx:0,vy:0,
    ang:ang,
    av:0,
    speed:0,
    state:'ramp',
    w:56,h:28,
    sx:1,sy:1,
    squash:0,
    wheel:0,
    color:isL?'#e74c3c':'#2980b9',
    colorDark:isL?'#c0392b':'#1a5276',
    colorLite:isL?'#ff6b5a':'#5dade2',
    settled:false,
    settleT:0,
    bounce:0
  };
}

let carL,carR;

function resetCars(){
  carL=makeCar('L');
  carR=makeCar('R');
  particles.length=0;
  sparks.length=0;
  dusts.length=0;
  stars.length=0;
  flashT=0;
  phase='run';
  loopTimer=0;
  placeOnRamp(carL,rampL);
  placeOnRamp(carR,rampR);
}

function placeOnRamp(car,ramp){
  const p=pointOnRamp(ramp,car.t);
  const ang=rampAngle(ramp);
  const off=14;
  car.x=p.x+Math.cos(ang+Math.PI/2)*off*(car.side==='L'?1:1);
  car.y=p.y+Math.sin(ang+Math.PI/2)*off;
  car.ang=ang+(car.side==='R'?Math.PI:0);
  if(car.side==='R'){
    car.x=p.x+Math.cos(ang-Math.PI/2)*off;
    car.y=p.y+Math.sin(ang-Math.PI/2)*off;
  }
}

function updateCar(car,dt){
  const ramp=car.side==='L'?rampL:rampR;
  const targetSpeed=620;
  const accel=900;

  if(car.state==='ramp'){
    car.speed=Math.min(targetSpeed,car.speed+accel*dt);
    const len=rampLen(ramp);
    car.t+= (car.speed*dt)/len;
    car.wheel+=car.speed*dt*0.08;
    if(car.t>=1){
      car.t=1;
      car.state='air';
      const ang=rampAngle(ramp);
      const launchAng=car.side==='L'?ang:ang+Math.PI;
      const sp=car.speed*1.05;
      car.vx=Math.cos(launchAng)*sp;
      car.vy=Math.sin(launchAng)*sp;
      car.av=(car.side==='L'?1:-1)*0.8;
      car.squash=0.35;
      const tip=pointOnRamp(ramp,1);
      spawnDust(tip.x,tip.y,10,launchAng+Math.PI*0.5*(car.side==='L'?1:-1));
      spawnDust(tip.x,tip.y,6,launchAng);
    }else{
      placeOnRamp(car,ramp);
      car.squash=Math.max(0,car.squash-dt*2);
      const bump=Math.sin(car.t*40)*0.02*(car.speed/targetSpeed);
      car.sx=1+bump;
      car.sy=1-bump*0.5;
    }
  }else if(car.state==='air'||car.state==='crash'){
    car.vy+=GRAV*dt;
    car.x+=car.vx*dt;
    car.y+=car.vy*dt;
    car.ang+=car.av*dt;
    car.av*=(1-0.4*dt);
    car.wheel+=Math.hypot(car.vx,car.vy)*dt*0.06;
    car.squash=Math.max(0,car.squash-dt*3);
    const sq=car.squash;
    car.sx=1+sq*0.5;
    car.sy=1-sq*0.4;

    if(car.y>groundY-10){
      car.y=groundY-10;
      if(Math.abs(car.vy)>80){
        car.vy*=-0.35;
        car.vx*=0.7;
        car.av+=(Math.random()-0.5)*4;
        car.squash=0.4;
        car.bounce++;
        spawnDust(car.x,groundY,6,-Math.PI/2);
      }else{
        car.vy=0;
        car.vx*=(1-3*dt);
        car.av*=(1-4*dt);
        if(Math.abs(car.vx)<15&&Math.abs(car.av)<0.3){
          car.vx=0;car.av=0;
          car.settled=true;
          car.settleT+=dt;
          car.ang=Math.round(car.ang/Math.PI)*Math.PI;
        }
      }
      car.state='crash';
    }
    if(car.x<-80||car.x>W+80){
      car.settled=true;
      car.settleT+=dt;
    }
  }
}

function checkCollision(){
  if(carL.state!=='air'&&carL.state!=='crash')return;
  if(carR.state!=='air'&&carR.state!=='crash')return;
  if(phase==='crashed')return;
  const dx=carR.x-carL.x;
  const dy=carR.y-carL.y;
  const dist=Math.hypot(dx,dy);
  const minD=48;
  if(dist<minD&&dist>0.1){
    phase='crashed';
    const nx=dx/dist,ny=dy/dist;
    const rvx=carL.vx-carR.vx;
    const rvy=carL.vy-carR.vy;
    const velAlong=rvx*nx+rvy*ny;
    if(velAlong>0)return;
    const e=0.65;
    const j=-(1+e)*velAlong/2;
    carL.vx-=j*nx;carL.vy-=j*ny;
    carR.vx+=j*nx;carR.vy+=j*ny;
    carL.vx-=40;carR.vx+=40;
    carL.vy-=120;carR.vy-=100;
    carL.av=-8-Math.random()*6;
    carR.av=8+Math.random()*6;
    carL.squash=0.55;carR.squash=0.55;
    carL.state='crash';carR.state='crash';
    const mx=(carL.x+carR.x)/2;
    const my=(carL.y+carR.y)/2;
    flashX=mx;flashY=my;flashT=0.35;
    spawnDebris(mx,my,28);
    spawnSparks(mx,my,40);
    spawnStar(mx,my);
    spawnDust(mx,my,12,0);
    spawnDust(mx,my,12,Math.PI);
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.vy+=GRAV*0.6*dt;
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.rot+=p.vr*dt;
    p.vx*=(1-0.5*dt);
    if(p.y>groundY){p.y=groundY;p.vy*=-0.3;p.vx*=0.6;}
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.life-=dt;
    if(s.life<=0){sparks.splice(i,1);continue;}
    s.x+=s.vx*dt;s.y+=s.vy*dt;
    s.vy+=GRAV*0.3*dt;
    s.vx*=(1-2*dt);s.vy*=(1-2*dt);
  }
  for(let i=dusts.length-1;i>=0;i--){
    const d=dusts[i];
    d.life-=dt;
    if(d.life<=0){dusts.splice(i,1);continue;}
    d.x+=d.vx*dt;d.y+=d.vy*dt;
    d.vx*=(1-2*dt);d.vy*=(1-1.5*dt);
    d.r+=20*dt;
  }
  for(let i=stars.length-1;i>=0;i--){
    const st=stars[i];
    st.life-=dt;
    if(st.life<=0){stars.splice(i,1);continue;}
    st.scale=1+(1-st.life/st.max)*1.8;
    st.rot+=dt*6;
  }
  if(flashT>0)flashT-=dt;
}

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#5dade2');
  g.addColorStop(0.45,'#85c1e9');
  g.addColorStop(0.7,'#aed6f1');
  g.addColorStop(1,'#d5f5e3');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.85)';
  drawCloud(W*0.15,H*0.12,50);
  drawCloud(W*0.55,H*0.08,70);
  drawCloud(W*0.82,H*0.18,45);
  drawCloud(W*0.35,H*0.22,35);
}
function drawCloud(x,y,s){
  ctx.beginPath();
  ctx.arc(x,y,s*0.5,0,Math.PI*2);
  ctx.arc(x+s*0.45,y-s*0.15,s*0.4,0,Math.PI*2);
  ctx.arc(x+s*0.85,y,s*0.45,0,Math.PI*2);
  ctx.arc(x+s*0.4,y+s*0.15,s*0.35,0,Math.PI*2);
  ctx.fill();
}

function drawGround(){
  ctx.fillStyle='#27ae60';
  ctx.beginPath();
  ctx.moveTo(0,groundY);
  ctx.lineTo(W,groundY);
  ctx.lineTo(W,H);
  ctx.lineTo(0,H);
  ctx.closePath();
  ctx.fill();
  const gg=ctx.createLinearGradient(0,groundY,0,H);
  gg.addColorStop(0,'#2ecc71');
  gg.addColorStop(0.3,'#27ae60');
  gg.addColorStop(1,'#1e8449');
  ctx.fillStyle=gg;
  ctx.fillRect(0,groundY,W,H-groundY);
  ctx.fillStyle='rgba(39,174,96,0.5)';
  for(let i=0;i<40;i++){
    const gx=(i*97+30)%W;
    const gh=4+((i*13)%7);
    ctx.fillRect(gx,groundY-gh,3,gh);
  }
}

function drawRamp(r,facing){
  const ang=rampAngle(r);
  const nx=Math.cos(ang+Math.PI/2);
  const ny=Math.sin(ang+Math.PI/2);
  const t=r.thick;
  const pts=[
    r.x0,r.y0,
    r.x1,r.y1,
    r.x1+nx*t,r.y1+ny*t,
    r.x0+nx*t,r.y0+ny*t
  ];
  ctx.beginPath();
  ctx.moveTo(pts[0],pts[1]);
  ctx.lineTo(pts[2],pts[3]);
  ctx.lineTo(pts[4],pts[5]);
  ctx.lineTo(pts[6],pts[7]);
  ctx.closePath();
  const dirt=ctx.createLinearGradient(r.x0,r.y0,r.x0+nx*t,r.y0+ny*t);
  dirt.addColorStop(0,'#a0522d');
  dirt.addColorStop(0.5,'#8B4513');
  dirt.addColorStop(1,'#6B3A0A');
  ctx.fillStyle=dirt;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(r.x0,r.y0);
  ctx.lineTo(r.x1,r.y1);
  ctx.lineTo(r.x1+nx*8,r.y1+ny*8);
  ctx.lineTo(r.x0+nx*8,r.y0+ny*8);
  ctx.closePath();
  const grass=ctx.createLinearGradient(r.x0,r.y0,r.x0+nx*8,r.y0+ny*8);
  grass.addColorStop(0,'#58d68d');
  grass.addColorStop(1,'#27ae60');
  ctx.fillStyle=grass;
  ctx.fill();
  ctx.strokeStyle='#1e8449';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(r.x0,r.y0);
  ctx.lineTo(r.x1,r.y1);
  ctx.stroke();
  ctx.fillStyle='#6B3A0A';
  const posts=5;
  for(let i=0;i<=posts;i++){
    const tt=i/posts;
    const px=r.x0+(r.x1-r.x0)*tt;
    const py=r.y0+(r.y1-r.y0)*tt;
    ctx.fillRect(px+nx*t-3,py+ny*t,6,groundY-(py+ny*t)+2);
  }
  ctx.fillStyle='#8B4513';
  ctx.beginPath();
  ctx.moveTo(r.x0+nx*t,r.y0+ny*t);
  ctx.lineTo(r.x1+nx*t,r.y1+ny*t);
  ctx.lineTo(r.x1+nx*t,groundY+2);
  ctx.lineTo(r.x0+nx*t,groundY+2);
  ctx.closePath();
  ctx.globalAlpha=0.35;
  ctx.fill();
  ctx.globalAlpha=1;
}

function roundRect(x,y,w,h,rad){
  ctx.beginPath();
  ctx.moveTo(x+rad,y);
  ctx.arcTo(x+w,y,x+w,y+h,rad);
  ctx.arcTo(x+w,y+h,x,y+h,rad);
  ctx.arcTo(x,y+h,x,y,rad);
  ctx.arcTo(x,y,x+w,y,rad);
  ctx.closePath();
}

function drawCar(car){
  ctx.save();
  ctx.translate(car.x,car.y);
  ctx.rotate(car.ang+(car.side==='R'?0:0));
  if(car.side==='R')ctx.scale(-1,1);
  ctx.scale(car.sx,car.sy);

  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(2,14,30,8,0,0,Math.PI*2);
  ctx.fill();

  const bodyG=ctx.createLinearGradient(0,-16,0,12);
  bodyG.addColorStop(0,car.colorLite);
  bodyG.addColorStop(0.4,car.color);
  bodyG.addColorStop(1,car.colorDark);
  ctx.fillStyle=bodyG;
  roundRect(-28,-12,56,24,8);
  ctx.fill();
  ctx.strokeStyle=car.colorDark;
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.fillStyle=car.colorLite;
  ctx.globalAlpha=0.45;
  roundRect(-24,-10,40,8,4);
  ctx.fill();
  ctx.globalAlpha=1;

  const cabG=ctx.createLinearGradient(0,-22,0,-4);
  cabG.addColorStop(0,'#d6eaf8');
  cabG.addColorStop(0.5,'#85c1e9');
  cabG.addColorStop(1,'#5dade2');
  ctx.fillStyle=cabG;
  roundRect(-10,-24,28,16,5);
  ctx.fill();
  ctx.strokeStyle='#2c3e50';
  ctx.lineWidth=1.2;
  ctx.stroke();

  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(-6,-20);ctx.lineTo(12,-20);
  ctx.stroke();

  ctx.fillStyle=car.colorDark;
  roundRect(-28,-4,8,6,2);
  ctx.fill();
  ctx.fillStyle='#f1c40f';
  roundRect(20,-4,8,5,2);
  ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';
  roundRect(22,-3,4,3,1);
  ctx.fill();

  drawWheel(-16,10,car.wheel);
  drawWheel(16,10,car.wheel);

  ctx.fillStyle=car.color;
  roundRect(-6,2,14,6,2);
  ctx.fill();

  ctx.restore();
}

function drawWheel(wx,wy,rot){
  ctx.save();
  ctx.translate(wx,wy);
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.arc(1,1,9,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#2c3e50';
  ctx.beginPath();
  ctx.arc(0,0,9,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();
  ctx.arc(0,0,7,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#7f8c8d';
  ctx.beginPath();
  ctx.arc(0,0,4.5,0,Math.PI*2);
  ctx.fill();
  ctx.rotate(rot);
  ctx.strokeStyle='#bdc3c7';
  ctx.lineWidth=1.5;
  for(let i=0;i<4;i++){
    ctx.rotate(Math.PI/2);
    ctx.beginPath();
    ctx.moveTo(0,0);ctx.lineTo(0,4);
    ctx.stroke();
  }
  ctx.fillStyle='#ecf0f1';
  ctx.beginPath();
  ctx.arc(0,0,2,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    const a=Math.max(0,p.life/p.max);
    ctx.save();
    ctx.translate(p.x,p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha=a;
    ctx.fillStyle=p.col;
    if(p.shape===0){
      ctx.fillRect(-p.r,-p.r*0.5,p.r*2,p.r);
    }else{
      ctx.beginPath();
      ctx.moveTo(0,-p.r);
      ctx.lineTo(p.r,p.r);
      ctx.lineTo(-p.r,p.r);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  ctx.globalAlpha=1;
  for(const s of sparks){
    const a=Math.max(0,s.life/s.max);
    const sp=Math.hypot(s.vx,s.vy)||1;
    ctx.strokeStyle=`rgba(255,${200+55*a|0},50,${a})`;
    ctx.lineWidth=1.5+a;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y);
    ctx.lineTo(s.x-s.vx/sp*s.len*a,s.y-s.vy/sp*s.len*a);
    ctx.stroke();
  }
  for(const d of dusts){
    const a=Math.max(0,d.life/d.max)*0.45;
    ctx.fillStyle=d.col+a+')';
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();
  }
  for(const st of stars){
    const a=Math.max(0,st.life/st.max);
    ctx.save();
    ctx.translate(st.x,st.y);
    ctx.rotate(st.rot);
    ctx.scale(st.scale,st.scale);
    ctx.globalAlpha=a;
    ctx.fillStyle='#fff59d';
    ctx.strokeStyle='#f39c12';
    ctx.lineWidth=2;
    drawBurstStar(0,0,8,22,8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle='#fff';
    drawBurstStar(0,0,4,12,8);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalAlpha=1;
  if(flashT>0){
    const a=flashT/0.35;
    ctx.save();
    ctx.translate(flashX,flashY);
    ctx.globalAlpha=a*0.9;
    const rg=ctx.createRadialGradient(0,0,0,0,0,60*a+20);
    rg.addColorStop(0,'rgba(255,255,200,0.9)');
    rg.addColorStop(0.3,'rgba(255,200,50,0.5)');
    rg.addColorStop(1,'rgba(255,100,0,0)');
    ctx.fillStyle=rg;
    ctx.beginPath();
    ctx.arc(0,0,80*a+30,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawBurstStar(x,y,inner,outer,points){
  ctx.beginPath();
  for(let i=0;i<points*2;i++){
    const r=i%2===0?outer:inner;
    const a=(i*Math.PI)/points-Math.PI/2;
    const px=x+Math.cos(a)*r;
    const py=y+Math.sin(a)*r;
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.closePath();
}

function drawHillsBg(){
  ctx.fillStyle='#1abc9c';
  ctx.beginPath();
  ctx.moveTo(0,groundY);
  ctx.quadraticCurveTo(W*0.15,groundY-H*0.12,W*0.3,groundY-H*0.05);
  ctx.quadraticCurveTo(W*0.5,groundY-H*0.18,W*0.7,groundY-H*0.06);
  ctx.quadraticCurveTo(W*0.85,groundY-H*0.14,W,groundY-H*0.04);
  ctx.lineTo(W,groundY);
  ctx.closePath();
  ctx.globalAlpha=0.35;
  ctx.fill();
  ctx.globalAlpha=1;
}

let last=performance.now();
function frame(now){
  let dt=(now-last)/1000;
  last=now;
  if(dt>DT_MAX)dt=DT_MAX;

  if(phase==='run'||phase==='crashed'){
    updateCar(carL,dt);
    updateCar(carR,dt);
    if(phase==='run')checkCollision();
    updateParticles(dt);

    if(carL.settled&&carR.settled){
      loopTimer+=dt;
      if(loopTimer>1.4){
        phase='reset';
        loopTimer=0;
      }
    }
  }else if(phase==='reset'){
    loopTimer+=dt;
    if(loopTimer>0.3){
      resetCars();
    }
  }

  drawSky();
  drawHillsBg();
  drawGround();
  drawRamp(rampL,'L');
  drawRamp(rampR,'R');
  drawParticles();
  if(carL.y<=carR.y){drawCar(carR);drawCar(carL);}
  else{drawCar(carL);drawCar(carR);}

  requestAnimationFrame(frame);
}

resize();
resetCars();
requestAnimationFrame(frame);
})();
</script>
