<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cloth</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#0b0b0d;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<script>
(function(){
"use strict";
var canvas=document.getElementById('cv');
var ctx=canvas.getContext('2d');

var COLS=30, ROWS=20;
var ITERS=6;
var DT=1/60;
var GRAV=1200;
var DAMP=0.99;
var WIND=760;

var W=0,H=0,DPR=1;
var pts=[],cons=[],spacing=24;
var simT=0;

function idx(c,r){return r*COLS+c;}

function buildCloth(){
  pts.length=0;
  cons.length=0;
  spacing=Math.min(W*0.55/(COLS-1),H*0.62/(ROWS-1));
  var cw=spacing*(COLS-1);
  var x0=(W-cw)/2;
  var y0=Math.max(20,H*0.09);
  var r,c;
  for(r=0;r<ROWS;r++){
    for(c=0;c<COLS;c++){
      var x=x0+c*spacing;
      var y=y0+r*spacing;
      pts.push({x:x,y:y,px:x-2.0*Math.sin(c*0.35),py:y,c:c,r:r,pin:(r===0)});
    }
  }
  var sd=spacing*Math.SQRT2;
  for(r=0;r<ROWS;r++){
    for(c=0;c<COLS;c++){
      if(c<COLS-1)cons.push([idx(c,r),idx(c+1,r),spacing]);
      if(r<ROWS-1)cons.push([idx(c,r),idx(c,r+1),spacing]);
      if(c<COLS-1&&r<ROWS-1){
        cons.push([idx(c,r),idx(c+1,r+1),sd]);
        cons.push([idx(c+1,r),idx(c,r+1),sd]);
      }
      if(c<COLS-2)cons.push([idx(c,r),idx(c+2,r),spacing*2]);
      if(r<ROWS-2)cons.push([idx(c,r),idx(c,r+2),spacing*2]);
    }
  }
}

function windAccel(p,t){
  var base=Math.sin(t*0.9)+0.6*Math.sin(t*0.43+1.3);
  var wave=Math.sin(t*3.0-p.c*0.45+0.5*Math.sin(t*0.7));
  return WIND*(base*(0.7+0.3*wave)+0.45*wave);
}

function step(dt){
  simT+=dt;
  var i,k,p;
  for(i=0;i<pts.length;i++){
    p=pts[i];
    if(p.pin)continue;
    var vx=(p.x-p.px)*DAMP;
    var vy=(p.y-p.py)*DAMP;
    p.px=p.x;
    p.py=p.y;
    var ax=windAccel(p,simT);
    p.x+=vx+ax*dt*dt;
    p.y+=vy+GRAV*dt*dt;
  }
  for(k=0;k<ITERS;k++){
    for(i=0;i<cons.length;i++){
      var con=cons[i];
      var a=pts[con[0]],b=pts[con[1]],rest=con[2];
      var dx=b.x-a.x,dy=b.y-a.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<1e-6)continue;
      var diff=(d-rest)/d;
      var wa=a.pin?0:1,wb=b.pin?0:1;
      var ws=wa+wb;
      if(ws===0)continue;
      var f=diff/ws;
      a.x+=dx*f*wa;
      a.y+=dy*f*wa;
      b.x-=dx*f*wb;
      b.y-=dy*f*wb;
    }
  }
  for(i=0;i<pts.length;i++){
    p=pts[i];
    if(p.pin)continue;
    if(p.x<0)p.x=0;else if(p.x>W)p.x=W;
    if(p.y<0)p.y=0;else if(p.y>H)p.y=H;
  }
}

function draw(){
  ctx.fillStyle='#0b0b0d';
  ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='#e6e6e6';
  ctx.lineWidth=1;
  ctx.beginPath();
  var r,c,p;
  for(r=0;r<ROWS;r++){
    p=pts[idx(0,r)];
    ctx.moveTo(p.x,p.y);
    for(c=1;c<COLS;c++){
      p=pts[idx(c,r)];
      ctx.lineTo(p.x,p.y);
    }
  }
  for(c=0;c<COLS;c++){
    p=pts[idx(c,0)];
    ctx.moveTo(p.x,p.y);
    for(r=1;r<ROWS;r++){
      p=pts[idx(c,r)];
      ctx.lineTo(p.x,p.y);
    }
  }
  ctx.stroke();

  ctx.fillStyle='#ff8a3d';
  for(c=0;c<COLS;c++){
    p=pts[idx(c,0)];
    ctx.beginPath();
    ctx.arc(p.x,p.y,4,0,Math.PI*2);
    ctx.fill();
  }

  ctx.fillStyle='#e6e6e6';
  ctx.font='12px monospace';
  ctx.textBaseline='top';
  ctx.fillText('cloth '+COLS+'x'+ROWS+'  relax '+ITERS+'  wind '+windAccel(pts[idx(COLS-1,ROWS-1)],simT).toFixed(0),10,10);
}

function resize(){
  DPR=window.devicePixelRatio||1;
  W=window.innerWidth;
  H=window.innerHeight;
  canvas.width=Math.round(W*DPR);
  canvas.height=Math.round(H*DPR);
  canvas.style.width=W+'px';
  canvas.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildCloth();
}

window.addEventListener('resize',resize);
resize();

var last=performance.now();
var acc=0;
function frame(now){
  var ft=(now-last)/1000;
  last=now;
  if(ft>0.1)ft=0.1;
  acc+=ft;
  while(acc>=DT){
    step(DT);
    acc-=DT;
  }
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
</html>
