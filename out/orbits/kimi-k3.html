<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Three-Body</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#0b0b0d;}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W = 0, H = 0;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + "px";
  canvas.style.height = H + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener("resize", resize);
resize();

const G = 1.0;
const EPS2 = 0.05 * 0.05; // softening^2

function rgbOf(hex) {
  return parseInt(hex.slice(1, 3), 16) + "," +
         parseInt(hex.slice(3, 5), 16) + "," +
         parseInt(hex.slice(5, 7), 16);
}

// Hierarchical triple: tight inner binary (m1,m2) + distant third body.
// Velocities chosen for circular inner/outer orbits and zero total momentum.
const bodies = [
  { m: 2.0, x: -0.5, y: 0, vx: 0, vy: -0.58164416, color: "#ff8a3d" },
  { m: 1.0, x:  1.0, y: 0, vx: 0, vy:  0.83256940, color: "#4fd1ff" },
  { m: 0.5, x:  8.0, y: 0, vx: 0, vy:  0.66143783, color: "#b48ead" }
];
for (const b of bodies) {
  b.r = Math.max(5, 6 * b.m);
  b.rgb = rgbOf(b.color);
  b.ax = 0; b.ay = 0; b.oax = 0; b.oay = 0;
  b.tx = []; b.ty = [];
}
const N = bodies.length;
const MAX_TRAIL = 900;
const DT = 0.001;      // fixed timestep (velocity Verlet)
const SPEED = 1.0;     // sim time units per real second

function computeAccel() {
  for (const b of bodies) { b.ax = 0; b.ay = 0; }
  for (let i = 0; i < N; i++) {
    const bi = bodies[i];
    for (let j = i + 1; j < N; j++) {
      const bj = bodies[j];
      const dx = bj.x - bi.x, dy = bj.y - bi.y;
      const r2 = dx * dx + dy * dy + EPS2;
      const inv = 1 / (r2 * Math.sqrt(r2));
      bi.ax += G * bj.m * dx * inv;
      bi.ay += G * bj.m * dy * inv;
      bj.ax -= G * bi.m * dx * inv;
      bj.ay -= G * bi.m * dy * inv;
    }
  }
}

function step(dt) {
  computeAccel();
  for (const b of bodies) {
    b.oax = b.ax; b.oay = b.ay;
    b.x += b.vx * dt + 0.5 * b.ax * dt * dt;
    b.y += b.vy * dt + 0.5 * b.ay * dt * dt;
  }
  computeAccel();
  for (const b of bodies) {
    b.vx += 0.5 * (b.oax + b.ax) * dt;
    b.vy += 0.5 * (b.oay + b.ay) * dt;
  }
}

function totalEnergy() {
  let e = 0;
  for (const b of bodies) e += 0.5 * b.m * (b.vx * b.vx + b.vy * b.vy);
  for (let i = 0; i < N; i++) {
    for (let j = i + 1; j < N; j++) {
      const dx = bodies[j].x - bodies[i].x;
      const dy = bodies[j].y - bodies[i].y;
      e -= G * bodies[i].m * bodies[j].m / Math.sqrt(dx * dx + dy * dy + EPS2);
    }
  }
  return e;
}
const E0 = totalEnergy();

let scale = 1, camInit = false;
let last = performance.now(), acc = 0;

function frame(t) {
  let el = (t - last) / 1000;
  last = t;
  if (el > 0.1) el = 0.1;
  acc += el * SPEED;
  while (acc >= DT) { step(DT); acc -= DT; }

  // record trails
  for (const b of bodies) {
    b.tx.push(b.x); b.ty.push(b.y);
    if (b.tx.length > MAX_TRAIL) { b.tx.shift(); b.ty.shift(); }
  }

  // center of mass
  let M = 0, cx = 0, cy = 0;
  for (const b of bodies) { M += b.m; cx += b.m * b.x; cy += b.m * b.y; }
  cx /= M; cy /= M;

  // smoothed zoom to fit
  let maxD = 1;
  for (const b of bodies) {
    const d = Math.hypot(b.x - cx, b.y - cy);
    if (d > maxD) maxD = d;
  }
  const target = 0.42 * Math.min(W, H) / maxD;
  if (!camInit) { scale = target; camInit = true; }
  else scale += (target - scale) * 0.03;

  const px = wx => W / 2 + (wx - cx) * scale;
  const py = wy => H / 2 + (wy - cy) * scale;

  // background
  ctx.fillStyle = "#0b0b0d";
  ctx.fillRect(0, 0, W, H);

  // trails (own color, fading up to 30% opacity, lineWidth 1)
  ctx.lineWidth = 1;
  for (const b of bodies) {
    const n = b.tx.length;
    if (n < 2) continue;
    for (let i = 1; i < n; i++) {
      const a = 0.3 * i / (n - 1);
      ctx.strokeStyle = "rgba(" + b.rgb + "," + a + ")";
      ctx.beginPath();
      ctx.moveTo(px(b.tx[i - 1]), py(b.ty[i - 1]));
      ctx.lineTo(px(b.tx[i]), py(b.ty[i]));
      ctx.stroke();
    }
  }

  // bodies (solid fill, no outline)
  for (const b of bodies) {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(px(b.x), py(b.y), b.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // energy drift text
  const drift = (totalEnergy() - E0) / Math.abs(E0) * 100;
  const txt = "energy drift: " + (drift >= 0 ? "+" : "") + drift.toFixed(5) + " %";
  ctx.font = "12px monospace";
  ctx.textBaseline = "top";
  ctx.fillStyle = "#e6e6e6";
  ctx.fillText(txt, 10, 10);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
