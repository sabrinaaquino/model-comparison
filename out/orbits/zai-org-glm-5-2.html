<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Three-Body Simulation</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0b0b0d; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const G = 1.0;
const soft = 0.05;
const dt = 0.003;
const substeps = 6;

const bodies = [
  {m: 1.5, color: '#ff8a3d', x: 0, y: 0, vx: 0, vy: 0, ax: 0, ay: 0, trail: []},
  {m: 1.0, color: '#4fd1ff', x: 0, y: 0, vx: 0, vy: 0, ax: 0, ay: 0, trail: []},
  {m: 0.6, color: '#b48ead', x: 0, y: 0, vx: 0, vy: 0, ax: 0, ay: 0, trail: []}
];

// Hierarchical triple: inner binary (m1,m2), outer third body (m3)
const r12 = 1.0;
const R = 4.5;
const M = 3.1;
const mb = 2.5;
const m3 = 0.6;
const yb = R * m3 / M;
const y3 = R * mb / M;

const vorbIn = Math.sqrt(G * 2.5 / r12);
const v1in = 0.4 * vorbIn;
const v2in = 0.6 * vorbIn;
const vorbOut = Math.sqrt(G * M / R);
const vbx = m3 / M * vorbOut;
const v3x = -mb / M * vorbOut;

bodies[0].x = -0.4;  bodies[0].y = -yb;
bodies[1].x =  0.6;  bodies[1].y = -yb;
bodies[2].x =  0.0;  bodies[2].y =  y3;

bodies[0].vx = vbx;  bodies[0].vy =  v1in;
bodies[1].vx = vbx;  bodies[1].vy = -v2in;
bodies[2].vx = v3x;  bodies[2].vy =  0.0;

function computeAcc() {
  for (let i = 0; i < 3; i++) { bodies[i].ax = 0; bodies[i].ay = 0; }
  for (let i = 0; i < 3; i++) {
    for (let j = i + 1; j < 3; j++) {
      const dx = bodies[j].x - bodies[i].x;
      const dy = bodies[j].y - bodies[i].y;
      const r2 = dx*dx + dy*dy + soft*soft;
      const r = Math.sqrt(r2);
      const invr3 = 1.0 / (r2 * r);
      const fx = G * dx * invr3;
      const fy = G * dy * invr3;
      bodies[i].ax += fx * bodies[j].m;
      bodies[i].ay += fy * bodies[j].m;
      bodies[j].ax -= fx * bodies[i].m;
      bodies[j].ay -= fy * bodies[i].m;
    }
  }
}

function totalEnergy() {
  let KE = 0, PE = 0;
  for (let i = 0; i < 3; i++) {
    KE += 0.5 * bodies[i].m * (bodies[i].vx*bodies[i].vx + bodies[i].vy*bodies[i].vy);
  }
  for (let i = 0; i < 3; i++) {
    for (let j = i + 1; j < 3; j++) {
      const dx = bodies[j].x - bodies[i].x;
      const dy = bodies[j].y - bodies[i].y;
      const r = Math.sqrt(dx*dx + dy*dy + soft*soft);
      PE -= G * bodies[i].m * bodies[j].m / r;
    }
  }
  return KE + PE;
}

computeAcc();
const E0 = totalEnergy();

const TRAIL_MAX = 400;

function step() {
  for (let s = 0; s < substeps; s++) {
    for (let i = 0; i < 3; i++) {
      bodies[i].vx += 0.5 * bodies[i].ax * dt;
      bodies[i].vy += 0.5 * bodies[i].ay * dt;
      bodies[i].x  += bodies[i].vx * dt;
      bodies[i].y  += bodies[i].vy * dt;
    }
    computeAcc();
    for (let i = 0; i < 3; i++) {
      bodies[i].vx += 0.5 * bodies[i].ax * dt;
      bodies[i].vy += 0.5 * bodies[i].ay * dt;
    }
  }
  for (let i = 0; i < 3; i++) {
    bodies[i].trail.push(bodies[i].x, bodies[i].y);
    if (bodies[i].trail.length > TRAIL_MAX * 2) {
      bodies[i].trail.splice(0, 2);
    }
  }
}

function render() {
  ctx.fillStyle = '#0b0b0d';
  ctx.fillRect(0, 0, W, H);

  let cx = 0, cy = 0, mtotal = 0;
  for (let i = 0; i < 3; i++) {
    cx += bodies[i].m * bodies[i].x;
    cy += bodies[i].m * bodies[i].y;
    mtotal += bodies[i].m;
  }
  cx /= mtotal; cy /= mtotal;

  const scale = Math.min(W, H) / 10;

  const wx = (x) => W / 2 + (x - cx) * scale;
  const wy = (y) => H / 2 + (y - cy) * scale;

  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.strokeStyle = bodies[i].color;
    ctx.globalAlpha = 0.3;
    const t = bodies[i].trail;
    if (t.length >= 4) {
      ctx.beginPath();
      ctx.moveTo(wx(t[0]), wy(t[1]));
      for (let k = 2; k < t.length; k += 2) {
        ctx.lineTo(wx(t[k]), wy(t[k + 1]));
      }
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  for (let i = 0; i < 3; i++) {
    const r = Math.max(5, bodies[i].m * 8);
    ctx.fillStyle = bodies[i].color;
    ctx.beginPath();
    ctx.arc(wx(bodies[i].x), wy(bodies[i].y), r, 0, Math.PI * 2);
    ctx.fill();
  }

  const E = totalEnergy();
  const drift = (E - E0) / Math.abs(E0) * 100;

  ctx.fillStyle = '#e6e6e6';
  ctx.font = '12px monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('Energy drift: ' + drift.toFixed(4) + '%', 10, 10);
}

function loop() {
  step();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
