<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0}html,body{width:100%;height:100%;overflow:hidden;background:#0b0b0d}canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
window.addEventListener('resize',resize);
resize();

const G=480;
const eps2=36;
const dt=0.012;
const trailLen=280;
const zoom=1.35;
const substeps=5;

const bodies=[
  {m:50,x:-55,y:8,vx:0.15,vy:2.65,color:'#ff8a3d',trail:[]},
  {m:30,x:85,y:-12,vx:-0.25,vy:-4.15,color:'#4fd1ff',trail:[]},
  {m:18,x:10,y:260,vx:-3.05,vy:0.35,color:'#b48ead',trail:[]}
];

function centerCOM(){
  let M=0,cx=0,cy=0,cvx=0,cvy=0;
  for(const b of bodies){M+=b.m;cx+=b.m*b.x;cy+=b.m*b.y;cvx+=b.m*b.vx;cvy+=b.m*b.vy}
  cx/=M;cy/=M;cvx/=M;cvy/=M;
  for(const b of bodies){b.x-=cx;b.y-=cy;b.vx-=cvx;b.vy-=cvy}
}
centerCOM();

function computeAccel(){
  const n=bodies.length;
  const ax=new Float64Array(n);
  const ay=new Float64Array(n);
  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      const dx=bodies[j].x-bodies[i].x;
      const dy=bodies[j].y-bodies[i].y;
      const r2=dx*dx+dy*dy+eps2;
      const inv=G/(r2*Math.sqrt(r2));
      const fx=dx*inv;
      const fy=dy*inv;
      ax[i]+=fx*bodies[j].m;
      ay[i]+=fy*bodies[j].m;
      ax[j]-=fx*bodies[i].m;
      ay[j]-=fy*bodies[i].m;
    }
  }
  return{ax,ay};
}

function step(){
  const a0=computeAccel();
  for(let i=0;i<bodies.length;i++){
    const b=bodies[i];
    b.x+=b.vx*dt+0.5*a0.ax[i]*dt*dt;
    b.y+=b.vy*dt+0.5*a0.ay[i]*dt*dt;
    b._ax=a0.ax[i];
    b._ay=a0.ay[i];
  }
  const a1=computeAccel();
  for(let i=0;i<bodies.length;i++){
    const b=bodies[i];
    b.vx+=0.5*(b._ax+a1.ax[i])*dt;
    b.vy+=0.5*(b._ay+a1.ay[i])*dt;
  }
  for(const b of bodies){
    b.trail.push({x:b.x,y:b.y});
    if(b.trail.length>trailLen)b.trail.shift();
  }
}

function totalEnergy(){
  let ke=0,pe=0;
  for(const b of bodies)ke+=0.5*b.m*(b.vx*b.vx+b.vy*b.vy);
  for(let i=0;i<bodies.length;i++){
    for(let j=i+1;j<bodies.length;j++){
      const dx=bodies[j].x-bodies[i].x;
      const dy=bodies[j].y-bodies[i].y;
      pe-=G*bodies[i].m*bodies[j].m/Math.sqrt(dx*dx+dy*dy+eps2);
    }
  }
  return ke+pe;
}

const E0=totalEnergy();

function getCOM(){
  let M=0,cx=0,cy=0;
  for(const b of bodies){M+=b.m;cx+=b.m*b.x;cy+=b.m*b.y}
  return{x:cx/M,y:cy/M};
}

function bodyRadius(m){return Math.max(5,m*0.28)}

function hexAlpha(hex,a){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${a})`;
}

function frame(){
  for(let s=0;s<substeps;s++)step();

  ctx.fillStyle='#0b0b0d';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const com=getCOM();
  const ox=canvas.width*0.5;
  const oy=canvas.height*0.5;

  for(const b of bodies){
    const t=b.trail;
    if(t.length<2)continue;
    ctx.beginPath();
    ctx.moveTo(ox+(t[0].x-com.x)*zoom,oy+(t[0].y-com.y)*zoom);
    for(let i=1;i<t.length;i++)ctx.lineTo(ox+(t[i].x-com.x)*zoom,oy+(t[i].y-com.y)*zoom);
    ctx.strokeStyle=hexAlpha(b.color,0.3);
    ctx.lineWidth=1;
    ctx.stroke();
  }

  for(const b of bodies){
    const sx=ox+(b.x-com.x)*zoom;
    const sy=oy+(b.y-com.y)*zoom;
    ctx.beginPath();
    ctx.arc(sx,sy,bodyRadius(b.m),0,Math.PI*2);
    ctx.fillStyle=b.color;
    ctx.fill();
  }

  const E=totalEnergy();
  const drift=((E-E0)/Math.abs(E0))*100;
  ctx.fillStyle='#e6e6e6';
  ctx.font='12px monospace';
  ctx.textAlign='left';
  ctx.textBaseline='top';
  ctx.fillText('Energy drift: '+drift.toFixed(4)+'%',10,10);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
