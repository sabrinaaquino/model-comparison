<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0b0b0d;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { alpha: false });

  const PARTICLE_COUNT = 1000;
  const RADIUS = 2;
  const GRAVITY = 520;
  const DRAG = 0.1;
  const RESTITUTION = 0.48;

  const particles = new Array(PARTICLE_COUNT);

  let width = 0;
  let height = 0;
  let floorY = 0;
  let dpr = 1;
  let seed = 0x4f1bbcdc;

  let previousTime = performance.now();
  let fpsStart = previousTime;
  let fpsFrames = 0;
  let displayedFPS = 60;

  function random() {
    seed |= 0;
    seed = (seed + 0x6D2B79F5) | 0;
    let t = seed;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  }

  function spawn(p) {
    const angle = (random() * 2 - 1) * 0.28;
    const speed = 640 + random() * 300;

    p.x = width * 0.5 + (random() * 2 - 1) * 3;
    p.y = floorY - RADIUS;
    p.px = p.x;
    p.py = p.y;
    p.vx = Math.sin(angle) * speed;
    p.vy = -Math.cos(angle) * speed;
    p.age = 0;
    p.life = 5.5 + random() * 2.5;
    p.alpha = 1;
    p.color = "#ffd23d";
  }

  function integrate(p, dt) {
    const damping = Math.exp(-DRAG * dt);

    p.vx *= damping;
    p.vy *= damping;
    p.vy += GRAVITY * dt;

    p.x += p.vx * dt;
    p.y += p.vy * dt;

    const contactY = floorY - RADIUS;
    if (p.y > contactY) {
      p.y = contactY;
      if (p.vy > 0) {
        p.vy = -p.vy * RESTITUTION;
        p.vx *= 0.82;
        if (Math.abs(p.vy) < 12) p.vy = 0;
      }
    }
  }

  function speedColor(speed) {
    const slow = [59, 130, 246];
    const medium = [230, 230, 230];
    const fast = [255, 210, 61];

    let a;
    let b;
    let t;

    if (speed <= 450) {
      a = slow;
      b = medium;
      t = Math.max(0, speed / 450);
    } else {
      a = medium;
      b = fast;
      t = Math.min(1, (speed - 450) / 450);
    }

    const r = Math.round(a[0] + (b[0] - a[0]) * t);
    const g = Math.round(a[1] + (b[1] - a[1]) * t);
    const blue = Math.round(a[2] + (b[2] - a[2]) * t);

    return `rgb(${r},${g},${blue})`;
  }

  function updateVisualState(p) {
    const remaining = p.life - p.age;
    p.alpha = Math.max(0, Math.min(1, remaining / (p.life * 0.2)));
    p.color = speedColor(Math.hypot(p.vx, p.vy));
  }

  function initializeParticles() {
    seed = 0x4f1bbcdc;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = particles[i] || {};
      particles[i] = p;
      spawn(p);

      const targetAge = random() * p.life;
      let simulated = 0;

      while (simulated < targetAge) {
        const step = Math.min(1 / 60, targetAge - simulated);
        integrate(p, step);
        simulated += step;
      }

      p.age = targetAge;
      p.px = p.x;
      p.py = p.y;
      updateVisualState(p);
    }
  }

  function resize() {
    const newWidth = Math.max(1, window.innerWidth);
    const newHeight = Math.max(1, window.innerHeight);
    const newDpr = Math.min(window.devicePixelRatio || 1, 2);

    if (newWidth === width && newHeight === height && newDpr === dpr) return;

    width = newWidth;
    height = newHeight;
    dpr = newDpr;
    floorY = Math.max(10, height - 24);

    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    initializeParticles();
  }

  function update(dt) {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = particles[i];

      p.px = p.x;
      p.py = p.y;
      p.age += dt;

      if (p.age >= p.life) {
        spawn(p);
      } else {
        integrate(p, dt);
      }

      updateVisualState(p);
    }
  }

  function render() {
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#0b0b0d";
    ctx.fillRect(0, 0, width, height);

    ctx.strokeStyle = "#e6e6e6";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, floorY);
    ctx.lineTo(width, floorY);
    ctx.stroke();

    ctx.lineWidth = 1;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = particles[i];
      ctx.globalAlpha = 0.3 * p.alpha;
      ctx.strokeStyle = p.color;
      ctx.beginPath();
      ctx.moveTo(p.px, p.py);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = particles[i];
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.globalAlpha = 1;
    ctx.fillStyle = "#e6e6e6";
    ctx.font = "12px monospace";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    ctx.fillText(`FPS: ${Math.round(displayedFPS)}`, 10, 10);
  }

  function frame(now) {
    const elapsed = now - previousTime;
    previousTime = now;

    const dt = Math.min(elapsed / 1000, 1 / 30);
    update(dt);

    fpsFrames++;
    const fpsElapsed = now - fpsStart;
    if (fpsElapsed >= 500) {
      displayedFPS = fpsFrames * 1000 / fpsElapsed;
      fpsFrames = 0;
      fpsStart = now;
    }

    render();
    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
