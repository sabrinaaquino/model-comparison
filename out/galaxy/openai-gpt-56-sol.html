<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d", { alpha: false });
  const galaxyCanvas = document.createElement("canvas");
  const galaxyCtx = galaxyCanvas.getContext("2d");

  const STAR_COUNT = 11000;
  const ARM_COUNT = 5;
  const stars = [];

  let width = 0;
  let height = 0;
  let dpr = 1;
  let galaxySize = 0;
  let startTime = performance.now();

  function randomGenerator(seed) {
    let state = seed >>> 0;
    return function() {
      state += 0x6D2B79F5;
      let t = state;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const random = randomGenerator(927461);

  function gaussian() {
    const a = Math.max(0.000001, random());
    const b = random();
    return Math.sqrt(-2 * Math.log(a)) * Math.cos(Math.PI * 2 * b);
  }

  function createStars() {
    stars.length = 0;

    const armStars = 8800;
    const coreStars = STAR_COUNT - armStars;

    for (let i = 0; i < armStars; i++) {
      const branch = i % ARM_COUNT;
      const radius = 0.025 + 0.975 * Math.pow(random(), 1.72);
      const branchAngle = branch * Math.PI * 2 / ARM_COUNT;
      const spinAngle = radius * 7.4;
      const spread = 0.045 + radius * 0.21;
      const angle = branchAngle + spinAngle + gaussian() * spread;
      const radialOffset = gaussian() * (0.006 + radius * 0.018);
      const r = Math.max(0, Math.min(1, radius + radialOffset));
      const thickness = gaussian() * (0.012 + r * 0.025);

      stars.push({
        x: Math.cos(angle) * r,
        y: Math.sin(angle) * r * 0.53 + thickness,
        radius: r,
        size: 0.34 + random() * 0.72 + (1 - r) * 0.35,
        alpha: 0.32 + random() * 0.62
      });
    }

    for (let i = 0; i < coreStars; i++) {
      const radius = Math.pow(random(), 3.15) * 0.34;
      const angle = random() * Math.PI * 2;
      const stretch = 0.58 + random() * 0.12;

      stars.push({
        x: Math.cos(angle) * radius,
        y: Math.sin(angle) * radius * stretch,
        radius,
        size: 0.45 + random() * 1.05 + (1 - radius) * 0.45,
        alpha: 0.46 + random() * 0.54
      });
    }
  }

  function colorAt(radius) {
    const t = Math.max(0, Math.min(1, radius));
    const r = Math.round(255 + (79 - 255) * t);
    const g = Math.round(215 + (209 - 215) * t);
    const b = Math.round(168 + (255 - 168) * t);
    return `rgb(${r},${g},${b})`;
  }

  function renderGalaxy() {
    const radius = Math.max(120, Math.min(width, height) * 0.455);
    const padding = 28;
    const cssSize = Math.ceil((radius + padding) * 2);

    galaxySize = cssSize;
    galaxyCanvas.width = Math.max(1, Math.round(cssSize * dpr));
    galaxyCanvas.height = Math.max(1, Math.round(cssSize * dpr));
    galaxyCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    galaxyCtx.clearRect(0, 0, cssSize, cssSize);
    galaxyCtx.translate(cssSize / 2, cssSize / 2);
    galaxyCtx.globalCompositeOperation = "lighter";

    const bloom = [
      [radius * 0.145, "#ffb86b", 0.018],
      [radius * 0.115, "#ffc47d", 0.025],
      [radius * 0.088, "#ffca8b", 0.035],
      [radius * 0.064, "#ffd09a", 0.052],
      [radius * 0.043, "#ffd7a8", 0.075],
      [radius * 0.027, "#ffe2bd", 0.11],
      [radius * 0.014, "#fff0d8", 0.18]
    ];

    for (const layer of bloom) {
      galaxyCtx.globalAlpha = layer[2];
      galaxyCtx.fillStyle = layer[1];
      galaxyCtx.beginPath();
      galaxyCtx.arc(0, 0, layer[0], 0, Math.PI * 2);
      galaxyCtx.fill();
    }

    for (const star of stars) {
      const x = star.x * radius;
      const y = star.y * radius;
      const size = star.size * (0.8 + dpr * 0.1);

      galaxyCtx.globalAlpha = star.alpha;
      galaxyCtx.fillStyle = colorAt(star.radius);
      galaxyCtx.beginPath();
      galaxyCtx.arc(x, y, size, 0, Math.PI * 2);
      galaxyCtx.fill();
    }

    galaxyCtx.globalAlpha = 1;
    galaxyCtx.fillStyle = "#fff4df";
    galaxyCtx.beginPath();
    galaxyCtx.arc(0, 0, Math.max(2.2, radius * 0.009), 0, Math.PI * 2);
    galaxyCtx.fill();

    galaxyCtx.globalCompositeOperation = "source-over";
    galaxyCtx.setTransform(1, 0, 0, 1, 0, 0);
  }

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    dpr = Math.min(window.devicePixelRatio || 1, 2);

    canvas.width = Math.max(1, Math.round(width * dpr));
    canvas.height = Math.max(1, Math.round(height * dpr));
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    renderGalaxy();
  }

  function animate(now) {
    const elapsed = (now - startTime) / 1000;
    const rotation = elapsed * 0.028;

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.globalCompositeOperation = "source-over";
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, width, height);

    ctx.translate(width / 2, height / 2);
    ctx.rotate(rotation);
    ctx.drawImage(
      galaxyCanvas,
      -galaxySize / 2,
      -galaxySize / 2,
      galaxySize,
      galaxySize
    );

    ctx.setTransform(1, 0, 0, 1, 0, 0);
    requestAnimationFrame(animate);
  }

  createStars();
  resize();
  window.addEventListener("resize", resize);
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
