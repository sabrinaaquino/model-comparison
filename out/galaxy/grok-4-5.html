<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spiral Galaxy</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  let W = 0, H = 0, CX = 0, CY = 0, dpr = 1;
  let rotation = 0;
  const ROT_SPEED = 0.0018;
  const NUM_STARS = 9000;
  const NUM_ARMS = 4;
  const MAX_R = 1;
  const SPIRAL = 3.2;
  const ARM_SPREAD = 0.28;

  const CORE = { r: 255, g: 215, b: 168 };
  const OUTER = { r: 79, g: 209, b: 255 };

  const stars = [];

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function starColor(t, bright) {
    const r = Math.round(lerp(CORE.r, OUTER.r, t) * bright);
    const g = Math.round(lerp(CORE.g, OUTER.g, t) * bright);
    const b = Math.round(lerp(CORE.b, OUTER.b, t) * bright);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  function initStars() {
    stars.length = 0;
    for (let i = 0; i < NUM_STARS; i++) {
      const arm = i % NUM_ARMS;
      // denser core: power > 1 packs more mass near center
      const u = Math.random();
      const radius = Math.pow(u, 1.55) * MAX_R;
      const branchAngle = (arm / NUM_ARMS) * Math.PI * 2;
      const spinAngle = radius * SPIRAL;
      // arm thickness + slight radial noise
      const noise = (Math.random() + Math.random() + Math.random() - 1.5) * ARM_SPREAD;
      const angle = branchAngle + spinAngle + noise;
      // mix a fraction of pure disk stars for soft fill
      const diskMix = Math.random() < 0.12;
      const finalAngle = diskMix ? Math.random() * Math.PI * 2 : angle;
      const t = Math.min(1, radius / MAX_R);
      // brighter near core
      const bright = 0.45 + 0.55 * (1 - t) * (0.6 + Math.random() * 0.4);
      const size = (0.4 + Math.random() * 1.1) * (1.2 - t * 0.5);
      stars.push({
        r: radius,
        a: finalAngle,
        size: size,
        color: starColor(t, Math.min(1, bright)),
        // slight individual spin offset for depth
        wobble: (Math.random() - 0.5) * 0.0004
      });
    }
    // extra dense core bulge
    for (let i = 0; i < 1200; i++) {
      const radius = Math.pow(Math.random(), 2.2) * MAX_R * 0.22;
      const angle = Math.random() * Math.PI * 2;
      const t = radius / MAX_R;
      const bright = 0.75 + Math.random() * 0.35;
      stars.push({
        r: radius,
        a: angle,
        size: 0.5 + Math.random() * 1.4,
        color: starColor(t * 0.4, Math.min(1, bright)),
        wobble: 0
      });
    }
  }

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    CX = W * 0.5;
    CY = H * 0.5;
  }

  function drawBloom() {
    const scale = Math.min(W, H) * 0.42;
    const g = ctx.createRadialGradient(CX, CY, 0, CX, CY, scale * 0.55);
    g.addColorStop(0, 'rgba(255, 220, 170, 0.22)');
    g.addColorStop(0.15, 'rgba(255, 180, 120, 0.08)');
    g.addColorStop(0.4, 'rgba(100, 160, 220, 0.03)');
    g.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(CX, CY, scale * 0.55, 0, Math.PI * 2);
    ctx.fill();

    // tighter hot core
    const g2 = ctx.createRadialGradient(CX, CY, 0, CX, CY, scale * 0.12);
    g2.addColorStop(0, 'rgba(255, 245, 220, 0.35)');
    g2.addColorStop(0.5, 'rgba(255, 200, 140, 0.1)');
    g2.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.arc(CX, CY, scale * 0.12, 0, Math.PI * 2);
    ctx.fill();
  }

  function frame() {
    // black background every frame
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    const scale = Math.min(W, H) * 0.42;
    rotation += ROT_SPEED;

    drawBloom();

    ctx.globalCompositeOperation = 'lighter';
    const n = stars.length;
    for (let i = 0; i < n; i++) {
      const s = stars[i];
      const a = s.a + rotation + s.wobble * (performance.now() * 0.001);
      const px = CX + Math.cos(a) * s.r * scale;
      const py = CY + Math.sin(a) * s.r * scale;
      const sz = s.size;
      ctx.fillStyle = s.color;
      // tiny filled rects are faster than arcs for thousands of points
      if (sz < 1.2) {
        ctx.fillRect(px - sz * 0.5, py - sz * 0.5, sz, sz);
      } else {
        ctx.beginPath();
        ctx.arc(px, py, sz * 0.55, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  initStars();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
