<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>spinning hexagon</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0b0b0d; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  placeHex();
}
window.addEventListener('resize', resize);

const hex = { cx:0, cy:0, R:0, angle:0, omega:0.45 };
function placeHex(){
  hex.cx = W/2;
  hex.cy = H/2;
  hex.R = Math.min(W, H) * 0.38;
}

const ball = { x:0, y:0, vx:0, vy:0, r:12, trail:[] };
function reset(){
  ball.x = hex.cx;
  ball.y = hex.cy - hex.R * 0.4;
  ball.vx = 140;
  ball.vy = 0;
  ball.trail.length = 0;
}

const GRAVITY = 950;
const RESTITUTION = 0.82;
const AIR_FRICTION = 0.995;
const WALL_FRICTION = 0.90;

function hexVertices(){
  const v = [];
  for(let i=0;i<6;i++){
    const a = hex.angle + i * Math.PI/3;
    v.push({ x: hex.cx + hex.R*Math.cos(a), y: hex.cy + hex.R*Math.sin(a) });
  }
  return v;
}

function step(dt){
  hex.angle += hex.omega * dt;

  ball.vy += GRAVITY * dt;
  const af = Math.pow(AIR_FRICTION, dt*60);
  ball.vx *= af;
  ball.vy *= af;
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;

  const verts = hexVertices();
  for(let i=0;i<6;i++){
    const a = verts[i], b = verts[(i+1)%6];
    const ex = b.x - a.x, ey = b.y - a.y;
    const elen = Math.hypot(ex, ey);
    let nx = -ey/elen, ny = ex/elen;
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    const toCx = hex.cx - mx, toCy = hex.cy - my;
    if(nx*toCx + ny*toCy < 0){ nx = -nx; ny = -ny; }

    const apx = ball.x - a.x, apy = ball.y - a.y;
    const t = (apx*ex + apy*ey)/(elen*elen);
    const tc = Math.max(0, Math.min(1, t));
    const cx = a.x + tc*ex, cy = a.y + tc*ey;

    const dx = ball.x - cx, dy = ball.y - cy;
    const dist = Math.hypot(dx, dy);
    const d = (ball.x - a.x)*nx + (ball.y - a.y)*ny;

    if(dist < ball.r || d < ball.r){
      // contact normal: prefer edge inward normal when near edge body
      let cnx, cny;
      if(t > 0 && t < 1){
        cnx = nx; cny = ny;
      } else {
        const il = Math.hypot(dx, dy) || 1;
        cnx = dx/il; cny = dy/il;
        // ensure pointing from wall toward ball (inward)
        if(cnx*toCx + cny*toCy > 0){ cnx = -cnx; cny = -cny; }
      }

      const rx = cx - hex.cx, ry = cy - hex.cy;
      const wvx = -hex.omega * ry;
      const wvy = hex.omega * rx;

      const rvx = ball.vx - wvx;
      const rvy = ball.vy - wvy;
      const vn = rvx*cnx + rvy*cny;

      // push out
      const pen = ball.r - d;
      if(pen > 0){
        ball.x += cnx * pen;
        ball.y += cny * pen;
      } else {
        // corner case: push along contact normal
        const pc = ball.r - dist;
        if(pc > 0){
          ball.x += cnx * pc;
          ball.y += cny * pc;
        }
      }

      if(vn < 0){
        const tx = -cny, ty = cnx;
        const vt = rvx*tx + rvy*ty;
        const newVn = -vn * RESTITUTION;
        const newVt = vt * WALL_FRICTION;
        const nrvx = newVn*cnx + newVt*tx;
        const nrvy = newVn*cny + newVt*ty;
        ball.vx = nrvx + wvx;
        ball.vy = nrvy + wvy;
      }
    }
  }

  ball.trail.push({x: ball.x, y: ball.y});
  if(ball.trail.length > 70) ball.trail.shift();
}

let last = performance.now();
let fps = 0, fpsAcc = 0, fpsCount = 0, fpsTimer = 0;

function loop(now){
  let dt = (now - last)/1000;
  last = now;
  if(dt > 0.05) dt = 0.05;

  const steps = 6;
  for(let i=0;i<steps;i++) step(dt/steps);

  fpsAcc += 1/dt; fpsCount++; fpsTimer += dt;
  if(fpsTimer > 0.5){ fps = Math.round(fpsAcc/fpsCount); fpsAcc=0; fpsCount=0; fpsTimer=0; }

  draw();
  requestAnimationFrame(loop);
}

function draw(){
  ctx.fillStyle = '#0b0b0d';
  ctx.fillRect(0, 0, W, H);

  // trail
  if(ball.trail.length > 1){
    ctx.strokeStyle = 'rgba(255,138,61,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=0;i<ball.trail.length;i++){
      const p = ball.trail[i];
      if(i===0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }

  // hexagon
  const verts = hexVertices();
  ctx.strokeStyle = '#e6e6e6';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const v = verts[i];
    if(i===0) ctx.moveTo(v.x, v.y);
    else ctx.lineTo(v.x, v.y);
  }
  ctx.closePath();
  ctx.stroke();

  // ball
  ctx.fillStyle = '#ff8a3d';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();

  // text
  ctx.fillStyle = '#e6e6e6';
  ctx.font = '12px monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText('fps ' + fps, 10, 10);
  ctx.fillText('omega ' + hex.omega.toFixed(2), 10, 26);
}

resize();
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
