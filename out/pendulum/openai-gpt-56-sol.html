<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
  background: #0b0b0d;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(() => {
  "use strict";

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  let width = 0;
  let height = 0;
  let dpr = 1;

  function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    dpr = window.devicePixelRatio || 1;

    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener("resize", resize);
  resize();

  const g = 9.81;
  const m1 = 1;
  const m2 = 1;
  const l1 = 1;
  const l2 = 1;

  const state = new Float64Array([
    2.2, 0.05,
    -1.1, -0.05
  ]);

  const k1 = new Float64Array(4);
  const k2 = new Float64Array(4);
  const k3 = new Float64Array(4);
  const k4 = new Float64Array(4);
  const temp = new Float64Array(4);

  function derivatives(s, out) {
    const theta1 = s[0];
    const omega1 = s[1];
    const theta2 = s[2];
    const omega2 = s[3];

    const delta = theta1 - theta2;
    const denominator =
      2 * m1 + m2 - m2 * Math.cos(2 * theta1 - 2 * theta2);

    const alpha1 =
      (
        -g * (2 * m1 + m2) * Math.sin(theta1)
        -m2 * g * Math.sin(theta1 - 2 * theta2)
        -2 * Math.sin(delta) * m2 *
          (
            omega2 * omega2 * l2 +
            omega1 * omega1 * l1 * Math.cos(delta)
          )
      ) / (l1 * denominator);

    const alpha2 =
      (
        2 * Math.sin(delta) *
        (
          omega1 * omega1 * l1 * (m1 + m2)
          + g * (m1 + m2) * Math.cos(theta1)
          + omega2 * omega2 * l2 * m2 * Math.cos(delta)
        )
      ) / (l2 * denominator);

    out[0] = omega1;
    out[1] = alpha1;
    out[2] = omega2;
    out[3] = alpha2;
  }

  function normalizeAngle(angle) {
    if (angle > Math.PI) angle -= Math.PI * 2;
    if (angle < -Math.PI) angle += Math.PI * 2;
    return angle;
  }

  function rk4Step(dt) {
    derivatives(state, k1);

    for (let i = 0; i < 4; i++) {
      temp[i] = state[i] + k1[i] * dt * 0.5;
    }
    derivatives(temp, k2);

    for (let i = 0; i < 4; i++) {
      temp[i] = state[i] + k2[i] * dt * 0.5;
    }
    derivatives(temp, k3);

    for (let i = 0; i < 4; i++) {
      temp[i] = state[i] + k3[i] * dt;
    }
    derivatives(temp, k4);

    for (let i = 0; i < 4; i++) {
      state[i] += dt * (
        k1[i] + 2 * k2[i] + 2 * k3[i] + k4[i]
      ) / 6;
    }

    state[0] = normalizeAngle(state[0]);
    state[2] = normalizeAngle(state[2]);
  }

  function lowerBobPosition() {
    return {
      x: l1 * Math.sin(state[0]) + l2 * Math.sin(state[2]),
      y: l1 * Math.cos(state[0]) + l2 * Math.cos(state[2])
    };
  }

  const fixedDt = 1 / 720;
  const trailLifetime = 12;
  const trail = [];
  let simulationTime = 0;
  let sampleCounter = 0;
  let accumulator = 0;
  let previousTime = performance.now() / 1000;

  const initialPosition = lowerBobPosition();
  trail.push({
    x: initialPosition.x,
    y: initialPosition.y,
    time: 0
  });

  function updateTrail() {
    const position = lowerBobPosition();
    trail.push({
      x: position.x,
      y: position.y,
      time: simulationTime
    });

    while (
      trail.length > 1 &&
      simulationTime - trail[0].time > trailLifetime
    ) {
      trail.shift();
    }
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = "#0b0b0d";
    ctx.fillRect(0, 0, width, height);

    const pivotX = width * 0.5;
    const pivotY = height * 0.27;
    const scale = Math.max(
      1,
      Math.min(width * 0.22, height * 0.31)
    );

    ctx.lineWidth = 1;
    ctx.lineCap = "round";

    for (let i = 1; i < trail.length; i++) {
      const age = simulationTime - trail[i].time;
      const opacity = 0.3 * Math.max(0, 1 - age / trailLifetime);

      const previous = trail[i - 1];
      const current = trail[i];

      ctx.beginPath();
      ctx.moveTo(
        pivotX + previous.x * scale,
        pivotY + previous.y * scale
      );
      ctx.lineTo(
        pivotX + current.x * scale,
        pivotY + current.y * scale
      );
      ctx.strokeStyle = `rgba(255, 138, 61, ${opacity})`;
      ctx.stroke();
    }

    const x1 = pivotX + Math.sin(state[0]) * scale;
    const y1 = pivotY + Math.cos(state[0]) * scale;
    const x2 = x1 + Math.sin(state[2]) * scale;
    const y2 = y1 + Math.cos(state[2]) * scale;

    ctx.strokeStyle = "#e6e6e6";
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(pivotX, pivotY);
    ctx.lineTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    ctx.fillStyle = "#ff8a3d";

    ctx.beginPath();
    ctx.arc(x1, y1, 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.beginPath();
    ctx.arc(x2, y2, 12, 0, Math.PI * 2);
    ctx.fill();
  }

  function animate(timestamp) {
    const now = timestamp / 1000;
    const elapsed = Math.min(0.1, Math.max(0, now - previousTime));
    previousTime = now;
    accumulator += elapsed;

    while (accumulator >= fixedDt) {
      rk4Step(fixedDt);
      simulationTime += fixedDt;
      accumulator -= fixedDt;

      sampleCounter++;
      if (sampleCounter >= 6) {
        sampleCounter = 0;
        updateTrail();
      }
    }

    draw();
    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
