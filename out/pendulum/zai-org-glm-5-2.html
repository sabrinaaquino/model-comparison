<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>html,body{margin:0;padding:0;overflow:hidden;background:#0b0b0d;}canvas{display:block;}</style></head><body><canvas id="c"></canvas><script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,pivotX,pivotY,scale;
function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  pivotX=W/2;
  pivotY=H*0.28;
  scale=Math.min(W,H)*0.22;
}
window.addEventListener('resize',resize);
resize();

// physics in SI-ish units; display scaled
const L1=1.0, L2=1.0;
const m1=1.0, m2=1.0;
const g=9.81;
let th1=2.2, th2=2.4; // radians from downward vertical
let w1=0.0, w2=0.0;

function derivs(s){
  const t1=s[0], o1=s[1], t2=s[2], o2=s[3];
  const d=t1-t2;
  const sd=Math.sin(d), cd=Math.cos(d);
  const den=(2*m1+m2-m2*Math.cos(2*t1-2*t2));
  const a1=(-g*(2*m1+m2)*Math.sin(t1)-m2*g*Math.sin(t1-2*t2)-2*sd*m2*(o2*o2*L2+o1*o1*L1*cd))/(L1*den);
  const a2=(2*sd*(o1*o1*L1*(m1+m2)+g*(m1+m2)*Math.cos(t1)+o2*o2*L2*m2*cd))/(L2*den);
  return [o1,a1,o2,a2];
}
function rk4(s,dt){
  const k1=derivs(s);
  const s2=[s[0]+k1[0]*dt/2,s[1]+k1[1]*dt/2,s[2]+k1[2]*dt/2,s[3]+k1[3]*dt/2];
  const k2=derivs(s2);
  const s3=[s[0]+k2[0]*dt/2,s[1]+k2[1]*dt/2,s[2]+k2[2]*dt/2,s[3]+k2[3]*dt/2];
  const k3=derivs(s3);
  const s4=[s[0]+k3[0]*dt,s[1]+k3[1]*dt,s[2]+k3[2]*dt,s[3]+k3[3]*dt];
  const k4=derivs(s4);
  return [
    s[0]+dt/6*(k1[0]+2*k2[0]+2*k3[0]+k4[0]),
    s[1]+dt/6*(k1[1]+2*k2[1]+2*k3[1]+k4[1]),
    s[2]+dt/6*(k1[2]+2*k2[2]+2*k3[2]+k4[2]),
    s[3]+dt/6*(k1[3]+2*k2[3]+2*k3[3]+k4[3])
  ];
}

const trail=[];
const MAXTRAIL=600;

let last=performance.now();
function frame(now){
  let dtFrame=(now-last)/1000;
  if(dtFrame>0.05) dtFrame=0.05;
  last=now;
  const steps=10;
  const dt=dtFrame/steps;
  let s=[th1,w1,th2,w2];
  for(let i=0;i<steps;i++) s=rk4(s,dt);
  th1=s[0];w1=s[1];th2=s[2];w2=s[3];

  const x1=pivotX+scale*L1*Math.sin(th1);
  const y1=pivotY+scale*L1*Math.cos(th1);
  const x2=x1+scale*L2*Math.sin(th2);
  const y2=y1+scale*L2*Math.cos(th2);

  trail.push([x2,y2]);
  if(trail.length>MAXTRAIL) trail.shift();

  ctx.fillStyle='#0b0b0d';
  ctx.fillRect(0,0,W,H);

  // trail (fading, max 30% opacity)
  ctx.lineWidth=1;
  ctx.lineCap='round';
  for(let i=1;i<trail.length;i++){
    const a=(i/trail.length)*0.3;
    ctx.strokeStyle='rgba(255,138,61,'+a.toFixed(4)+')';
    ctx.beginPath();
    ctx.moveTo(trail[i-1][0],trail[i-1][1]);
    ctx.lineTo(trail[i][0],trail[i][1]);
    ctx.stroke();
  }

  // rods + pivot marker
  ctx.strokeStyle='#e6e6e6';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(pivotX,pivotY);
  ctx.lineTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(pivotX,pivotY,3,0,Math.PI*2);
  ctx.stroke();

  // bobs
  ctx.fillStyle='#ff8a3d';
  ctx.beginPath();
  ctx.arc(x1,y1,12,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x2,y2,12,0,Math.PI*2);
  ctx.fill();

  // text
  ctx.fillStyle='#e6e6e6';
  ctx.font='12px monospace';
  ctx.textBaseline='top';
  ctx.fillText('double pendulum — RK4',10,10);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script></body></html>
