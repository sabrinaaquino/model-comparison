<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>donut</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #0b0b0d;
  }
  canvas {
    display: block;
    background: #0b0b0d;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d", { alpha: false });

  // ASCII luminance ramp, dimmest -> brightest (Andy Sloane's donut.c)
  const RAMP = ".,-~:;=!*#$@";
  const RAMP_LEN = RAMP.length;

  // Torus parameters
  const R1 = 1.0;       // minor radius (tube)
  const R2 = 2.0;       // major radius (center -> tube center)
  const K2 = 5.0;       // viewer distance to donut center
  let K1 = 0;           // screen projection scale, set on resize

  // Rotation state
  let A = 0.0;          // rotation about X
  let B = 0.0;          // rotation about Z / Y
  const A_SPIN = 0.070; // rad per frame at 60fps
  const B_SPIN = 0.030;

  // Sampling resolution along the torus surface
  const THETA_STEPS = 80;
  const PHI_STEPS = 40;

  // Fixed light direction (unit-ish; normalized per point)
  const LX = 0;
  const LY = 0.7071;     // ~ 1/sqrt(2)
  const LZ = 0.7071;

  // Text grid
  let charW = 8;
  let charH = 16;
  let cols = 0;
  let rows = 0;
  let buf = null;
  let zbuf = null;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Measure monospace glyph size at a reference font size
    const ref = 16;
    ctx.font = ref + "px monospace";
    const m = ctx.measureText("M");
    charW = Math.max(6, m.width);
    charH = ref;

    // Fill a good portion of the canvas: use ~88% of min dimension
    const minD = Math.min(canvas.width, canvas.height);
    K1 = Math.max(40, (minD * 0.88 * K2 * 0.5) / (R1 + R2));

    cols = Math.floor(canvas.width / charW);
    rows = Math.floor(canvas.height / charH);
    buf = new Array(cols * rows);
    zbuf = new Float32Array(cols * rows);
  }

  function render() {
    // Clear background flat
    ctx.fillStyle = "#0b0b0d";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Reset buffers
    for (let i = 0; i < cols * rows; i++) {
      buf[i] = " ";
      zbuf[i] = -Infinity;
    }

    const cosA = Math.cos(A), sinA = Math.sin(A);
    const cosB = Math.cos(B), sinB = Math.sin(B);

    const halfW = canvas.width * 0.5;
    const halfH = canvas.height * 0.5;

    for (let j = 0; j < THETA_STEPS; j++) {
      const theta = (j / THETA_STEPS) * Math.PI * 2;
      const ct = Math.cos(theta);
      const st = Math.sin(theta);

      for (let i = 0; i < PHI_STEPS; i++) {
        const phi = (i / PHI_STEPS) * Math.PI * 2;
        const cp = Math.cos(phi);
        const sp = Math.sin(phi);

        // Torus surface point (pre-rotation)
        const circleX = R2 + R1 * ct;
        const x0 = circleX * cp;
        const y0 = R1 * st;
        const z0 = circleX * sp;

        // Surface normal (pre-rotation)
        const nx0 = ct * cp;
        const ny0 = st;
        const nz0 = ct * sp;

        // Rotate about X (A), then about Z (B)
        const x1 = x0 * cosB - y0 * sinB;
        const y1 = x0 * sinB + y0 * cosB;
        const z1 = z0;

        const x2 = x1;
        const y2 = y1 * cosA - z1 * sinA;
        const z2 = y1 * sinA + z1 * cosA;

        const nx1 = nx0 * cosB - ny0 * sinB;
        const ny1 = nx0 * sinB + ny0 * cosB;
        const nz1 = nz0;

        const nx2 = nx1;
        const ny2 = ny1 * cosA - nz1 * sinA;
        const nz2 = ny1 * sinA + nz1 * cosA;

        // Push back from viewer
        const zCam = z2 + K2;

        // Perspective projection
        const invZ = 1 / zCam;
        const sx = (x2 * K1 * invZ) + halfW;
        const sy = (y2 * K1 * invZ) + halfH;

        const cx = (sx / charW) | 0;
        const cy = (sy / charH) | 0;

        if (cx < 0 || cx >= cols || cy < 0 || cy >= rows) continue;

        // Lambert shading (normal already normalized since R1 cancels)
        const lum = nx2 * LX + ny2 * LY + nz2 * LZ;
        if (lum <= 0) continue;

        const idx = cy * cols + cx;
        if (invZ > zbuf[idx]) {
          zbuf[idx] = invZ;
          // Map luminance (~0..1.4) to ramp index
          let li = (lum * 8) | 0;
          if (li < 0) li = 0;
          else if (li >= RAMP_LEN) li = RAMP_LEN - 1;
          buf[idx] = RAMP.charAt(li);
        }
      }
    }

    // Draw the ASCII grid
    ctx.fillStyle = "#e6e6e6";
    ctx.font = "16px monospace";
    ctx.textBaseline = "top";
    ctx.textAlign = "left";

    for (let y = 0; y < rows; y++) {
      const rowStart = y * cols;
      const py = y * charH;
      let runStart = -1;
      for (let x = 0; x < cols; x++) {
        const ch = buf[rowStart + x];
        if (ch !== " ") {
          if (runStart === -1) runStart = x;
        } else {
          if (runStart !== -1) {
            ctx.fillText(
              buf.slice(rowStart + runStart, rowStart + x).join(""),
              runStart * charW,
              py
            );
            runStart = -1;
          }
        }
      }
      if (runStart !== -1) {
        ctx.fillText(
          buf.slice(rowStart + runStart, rowStart + cols).join(""),
          runStart * charW,
          py
        );
      }
    }
  }

  let last = 0;
  function frame(t) {
    if (last === 0) last = t;
    const dt = Math.min(50, t - last);
    last = t;
    const k = dt / 16.6667; // normalize to 60fps step

    A += A_SPIN * k;
    B += B_SPIN * k;
    if (A > Math.PI * 2) A -= Math.PI * 2;
    if (B > Math.PI * 2) B -= Math.PI * 2;

    render();
    requestAnimationFrame(frame);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
