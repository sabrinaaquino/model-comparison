<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #0b0b0d;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(() => {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const columns = 80;
  const rows = 32;
  const ramp = ".,-~:;=!*#$@";
  const TAU = Math.PI * 2;

  let width = 0;
  let height = 0;
  let angleA = 0;
  let angleB = 0;
  let previousTime = performance.now();

  const characters = new Array(columns * rows);
  const zBuffer = new Float32Array(columns * rows);

  function resize() {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = Math.round(width * dpr);
    canvas.height = Math.round(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function render(time) {
    const delta = Math.min(0.05, (time - previousTime) / 1000);
    previousTime = time;

    angleA += delta * 0.8;
    angleB += delta * 0.45;

    ctx.fillStyle = "#0b0b0d";
    ctx.fillRect(0, 0, width, height);

    characters.fill(" ");
    zBuffer.fill(0);

    const sinA = Math.sin(angleA);
    const cosA = Math.cos(angleA);
    const sinB = Math.sin(angleB);
    const cosB = Math.cos(angleB);

    const majorRadius = 2;
    const minorRadius = 1;
    const cameraDistance = 5;
    const projectionScale = columns * 0.375;

    for (let phi = 0; phi < TAU; phi += 0.035) {
      const sinPhi = Math.sin(phi);
      const cosPhi = Math.cos(phi);

      for (let theta = 0; theta < TAU; theta += 0.075) {
        const sinTheta = Math.sin(theta);
        const cosTheta = Math.cos(theta);
        const ring = majorRadius + minorRadius * cosTheta;

        const baseX = ring * cosPhi;
        const baseY = minorRadius * sinTheta;
        const baseZ = ring * sinPhi;

        const rotatedY = cosA * baseY - sinA * baseZ;
        const rotatedZ = sinA * baseY + cosA * baseZ;
        const rotatedX = cosB * baseX - sinB * rotatedY;
        const finalY = sinB * baseX + cosB * rotatedY;
        const finalZ = cameraDistance + rotatedZ;

        const inverseZ = 1 / finalZ;
        const screenX = Math.floor(
          columns * 0.5 + projectionScale * inverseZ * rotatedX
        );
        const screenY = Math.floor(
          rows * 0.5 - projectionScale * 0.6 * inverseZ * finalY
        );

        if (
          screenX < 0 || screenX >= columns ||
          screenY < 0 || screenY >= rows
        ) {
          continue;
        }

        const normalX0 = cosTheta * cosPhi;
        const normalY0 = cosA * sinTheta - sinA * cosTheta * sinPhi;
        const normalZ = sinA * sinTheta + cosA * cosTheta * sinPhi;
        const normalY = sinB * normalX0 + cosB * normalY0;

        const brightness = Math.max(
          0,
          Math.min(1, (normalY - normalZ) / Math.SQRT2)
        );

        const index = screenX + screenY * columns;
        if (inverseZ > zBuffer[index]) {
          zBuffer[index] = inverseZ;
          characters[index] =
            ramp[Math.min(ramp.length - 1, Math.floor(brightness * ramp.length))];
        }
      }
    }

    const fontSize = Math.max(
      6,
      Math.floor(Math.min(width / 50, height / (rows * 1.05)))
    );
    const lineHeight = fontSize * 1.05;

    ctx.font = fontSize + "px monospace";
    ctx.textBaseline = "top";
    ctx.fillStyle = "#e6e6e6";

    const cellWidth = ctx.measureText("M").width;
    const blockWidth = cellWidth * columns;
    const blockHeight = lineHeight * rows;
    const startX = (width - blockWidth) * 0.5;
    const startY = (height - blockHeight) * 0.5;

    for (let row = 0; row < rows; row++) {
      const line = characters
        .slice(row * columns, (row + 1) * columns)
        .join("");
      ctx.fillText(line, startX, startY + row * lineHeight);
    }

    requestAnimationFrame(render);
  }

  window.addEventListener("resize", resize);
  resize();
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
