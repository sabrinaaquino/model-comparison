<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Model Showdown — physics olympics</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; box-sizing: border-box; }
  body { background: #0b0b0d; color: #e6e6e6; font-family: ui-monospace, Consolas, monospace; height: 100vh; display: flex; flex-direction: column; }
  header { padding: 10px 16px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #232328; flex-wrap: wrap; }
  header h1 { font-size: 14px; font-weight: 600; letter-spacing: .4px; }
  header .sub { font-size: 11px; color: #8a8a92; }
  nav { display: flex; gap: 6px; margin-left: auto; }
  nav button { font: inherit; font-size: 11px; color: #b9b9c0; background: #141418; border: 1px solid #2e2e34; border-radius: 99px; padding: 4px 12px; cursor: pointer; }
  nav button.active { color: #0b0b0d; background: #e6e6e6; border-color: #e6e6e6; font-weight: 600; }
  .physics { padding: 6px 16px; font-size: 11px; color: #8a8a92; border-bottom: 1px solid #1a1a1e; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 1px; background: #232328; min-height: 0; }
  .cell { position: relative; background: #0b0b0d; min-height: 0; }
  .cell iframe { width: 100%; height: 100%; border: 0; display: block; }
  .tag { position: absolute; top: 8px; left: 10px; z-index: 2; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: #141418cc; border: 1px solid #2e2e34; backdrop-filter: blur(4px); }
  .tag b { font-weight: 600; }
  .tag i { font-style: normal; color: #8a8a92; margin-left: 6px; }
</style>
</head>
<body>
<header>
  <h1>MODEL SHOWDOWN</h1>
  <span class="sub">same prompt · temp 0.6 · seed 42 · one shot · via Venice API · Jul 8 2026</span>
  <nav id="tabs"></nav>
</header>
<div class="physics" id="physics"></div>
<main id="grid"></main>
<script>
const TASKS = [
  { id: "hexagon",   label: "Spinning hexagon",  physics: "Event 1 — collisions in a rotating reference frame: gravity + friction, ball must never escape the spinning walls." },
  { id: "pendulum",  label: "Double pendulum",   physics: "Event 2 — chaos + integration stability: correct equations of motion, RK4, no damping, energy must not blow up." },
  { id: "particles", label: "Particle fountain", physics: "Event 3 — many-body + performance: 800+ recycled particles, drag, floor bounces, speed-colored, 60fps with FPS counter." },
  { id: "orbits",    label: "Three-body orbits", physics: "Event 4 — gravitation + conservation: Newtonian three-body, velocity Verlet, COM camera, energy drift % on screen." },
  { id: "cloth",     label: "Cloth in wind",     physics: "Event 5 — soft-body constraints: Verlet cloth mesh pinned at the top, gravity + wind, must ripple without exploding or collapsing." },
  { id: "fluid",     label: "Fluid (water)",     physics: "Event 6 — fluid dynamics: particle-based SPH water (~1000 particles) sloshing in a rocking container; must stay contained and not explode." },
  { id: "throwing",  label: "Throwing objects",  physics: "Event 7 — projectiles + collisions: objects thrown in arcs from a launcher, bouncing off floor/walls and piling up (particles)." },
  { id: "ship",      label: "Ship on waves",     physics: "Event 8 — buoyancy: a particle ship riding rolling particle waves, bobbing and pitching with the surface." },
];
const MODELS = [
  { id: "claude-fable-5",  name: "Claude Fable 5", lab: "Anthropic" },
  { id: "openai-gpt-56-sol", name: "GPT-5.6 Sol",   lab: "OpenAI" },
  { id: "zai-org-glm-5-2", name: "GLM 5.2",        lab: "Zhipu" },
  { id: "grok-4-5",        name: "Grok 4.5",       lab: "xAI" },
];

const tabs = document.getElementById("tabs");
const grid = document.getElementById("grid");
const physics = document.getElementById("physics");

function show(taskId) {
  const task = TASKS.find(t => t.id === taskId) || TASKS[0];
  history.replaceState(null, "", "#" + task.id);
  physics.textContent = task.physics;
  for (const b of tabs.children) b.classList.toggle("active", b.dataset.id === task.id);
  const bust = Date.now();
  grid.innerHTML = MODELS.map(m => `
    <div class="cell">
      <span class="tag"><b>${m.name}</b><i>${m.lab}</i></span>
      <iframe src="out/${task.id}/${m.id}.html?t=${bust}" title="${m.name} — ${task.label}"></iframe>
    </div>`).join("");
}

for (const t of TASKS) {
  const b = document.createElement("button");
  b.textContent = t.label;
  b.dataset.id = t.id;
  b.onclick = () => show(t.id);
  tabs.appendChild(b);
}
show(location.hash.slice(1) || TASKS[0].id);
</script>
</body>
</html>
